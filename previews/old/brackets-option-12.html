    .model-tab.active { color: #efefef; }
    .tab-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 7px; vertical-align: middle; }

let currentModel = 'scout';
let currentRegion = 'east';

function switchModel(model, el, color) {
  currentModel = model;
  document.querySelectorAll('.model-tab').forEach(t => {
    t.classList.remove('active');
    t.style.borderBottomColor = 'transparent';
    t.style.color = '#888';
  });
  el.classList.add('active');
  el.style.borderBottomColor = color;
  el.style.color = '#efefef';

  // Update region tabs color
  document.querySelectorAll('.region-tab.active').forEach(t => {
    t.style.background = color;
    t.style.color = '#141414';
  });

  renderRegion();
}

function switchRegion(region, el) {
  currentRegion = region;
  const color = MODELS[currentModel].color;

  document.querySelectorAll('.region-tab').forEach(t => {
    t.classList.remove('active');
    t.style.background = 'transparent';
    t.style.color = '#888';
    t.style.borderColor = '#333';
  });
  el.classList.add('active');
  el.style.background = color;
  el.style.color = '#141414';
  el.style.borderColor = color;

  renderRegion();
}

function renderRegion() {
  const model = MODELS[currentModel];
  const color = model.color;
  const container = document.getElementById('regionContent');

  if (currentRegion === 'ff') {
    renderFF(model, color, container);
    return;
  }

  const regionData = model[currentRegion];
  const regionNames = { east: 'East', west: 'West', south: 'South', midwest: 'Midwest' };
  const regionName = regionNames[currentRegion];

  let totalCards = regionData.rounds.reduce((a, r) => a + r.matchups.length, 0);

  let html = `
    <div class="region-content">
      <div class="region-heading">
        <div class="rh-badge" style="color:${color};border-color:${color};background:rgba(${hexToRgb(color)},0.08)">${regionName}</div>
        <div class="rh-text">${regionName} Region</div>
        <div class="rh-count">${totalCards} matchups</div>
      </div>
  `;

  regionData.rounds.forEach(round => {
    const ptsBg = `rgba(${hexToRgb(color)},0.12)`;
    html += `
      <div class="round-divider">
        <div class="rd-line"></div>
        <span class="rd-label">${round.label}</span>
        <span class="rd-pts" style="background:${ptsBg};color:${color}">${round.pts} pts</span>
        <div class="rd-line"></div>
      </div>
    `;
    round.matchups.forEach((m, i) => {
      const id = `m-${currentModel}-${currentRegion}-${round.label.replace(/\s/g,'-')}-${i}`;
      const winnerName = m.winner===0 ? m.t1.name : m.t2.name;
      const winnerSeed = m.winner===0 ? m.t1.seed : m.t2.seed;
      html += `
        <div class="matchup-card" id="${id}" style="--mc:${color}" onclick="toggleCard('${id}')">
          <div class="mc-inner">
            <div class="mc-teams">
              <div class="mc-team ${m.winner===0?'winner':''}">
                <div class="mc-seed">${m.t1.seed}</div>
                <div class="mc-name">${m.t1.name}</div>
                ${m.winner===0?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`:''}
              </div>
              <div class="mc-team ${m.winner===1?'winner':''}">
                <div class="mc-seed">${m.t2.seed}</div>
                <div class="mc-name">${m.t2.name}</div>
                ${m.winner===1?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`:''}
              </div>
            </div>
            <div class="mc-side">
              <div class="mc-conf-num" style="color:${color}">${m.conf}%</div>
              <div class="mc-conf-label">conf</div>
            </div>
          </div>
          <div class="mc-expand">
            <span>View Reasoning</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="mc-reasoning">
            <div class="mc-reasoning-text">${m.reasoning}</div>
            <div class="mc-conf-bar">
              <div class="mc-cb-header">
                <span class="mc-cb-label">${winnerSeed} ${winnerName} — Predicted Winner</span>
                <span class="mc-cb-val" style="color:${color}">${m.conf}%</span>
              </div>
              <div class="mc-cb-track"><div class="mc-cb-fill" style="width:${m.conf}%;background:${color}"></div></div>
            </div>
          </div>
        </div>
      `;
    });
  });

  html += '</div>';
  container.innerHTML = html;
}

function renderFF(model, color, container) {

  let html = `

              </div>
              <div class="mc-team ${m.winner===1?'winner':''}">
                <div class="mc-seed">${m.t2.seed}</div>
                <div class="mc-name">${m.t2.name}</div>
                ${m.winner===1?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`:''}
              </div>
            </div>
            <div class="mc-side">
              <div class="mc-conf-num" style="color:${color}">${m.conf}%</div>
              <div class="mc-conf-label">conf</div>
            </div>
          </div>
          <div class="mc-expand">
            <span>View Reasoning</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="mc-reasoning">
            <div class="mc-reasoning-text">${m.reasoning}</div>
          </div>
        </div>
      </div>
    `;
  });

  const fm = ff.final;
  const fid = `ff-final-${currentModel}`;
  html += `
    <div class="round-divider">
      <div class="rd-line"></div>
      <span class="rd-label">National Championship</span>
      <span class="rd-pts" style="background:${ptsBg};color:${color}">320 pts</span>
      <div class="rd-line"></div>
    </div>
    <div class="ff-matchup-card">
      <div class="ff-mc-label">
        <span>Championship Game</span>
        <span class="ff-mc-round">Title</span>
      </div>
      <div class="matchup-card" id="${fid}" style="--mc:${color};border-radius:0;border:none;border-top:1px solid #252525;margin-bottom:0" onclick="toggleCard('${fid}')">
        <div class="mc-inner">
          <div class="mc-teams">
            <div class="mc-team ${fm.winner===0?'winner':''}">
              <div class="mc-seed">${fm.t1.seed}</div>
              <div class="mc-name">${fm.t1.name}</div>
              ${fm.winner===0?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`:''}
            </div>
            <div class="mc-team ${fm.winner===1?'winner':''}">
              <div class="mc-seed">${fm.t2.seed}</div>
              <div class="mc-name">${fm.t2.name}</div>
              ${fm.winner===1?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`:''}
            </div>
          </div>
          <div class="mc-side">
            <div class="mc-conf-num" style="color:${color}">${fm.conf}%</div>

        <div class="mc-expand">

          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="mc-reasoning">
          <div class="mc-reasoning-text">${fm.reasoning}</div>
        </div>
      </div>
    </div>
    <div class="champion-reveal">
      <div class="cr-label">Champion Pick</div>
      <div class="cr-name" style="color:${color}">${model.champion}</div>
      <div class="cr-meta">#${model.champSeed} Seed · ${model.champRegion} Region</div>
    </div>
  `;

  html += '</div>';
  container.innerHTML = html;
}

function toggleCard(id) {
  document.getElementById(id).classList.toggle('open');
}

function hexToRgb(hex) {
  if (hex === '#00ff88') return '0,255,136';
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

  const firstModelTab = document.querySelector('.model-tab.active');
  if (firstModelTab) {
    firstModelTab.style.borderBottomColor = MODELS.scout.color;

    firstRegionTab.style.background = MODELS.scout.color;
    firstRegionTab.style.color = '#141414';
    firstRegionTab.style.borderColor = MODELS.scout.color;
  }
  renderRegion();
});
