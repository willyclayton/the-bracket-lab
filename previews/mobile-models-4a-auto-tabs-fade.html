<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option 4A: Auto-Cycling Tabs with Fade</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #141414; color: #efefef; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; max-width: 420px; margin: 0 auto; }
  h2 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; text-align: center; }
  .desc { text-align: center; color: #666; font-size: 12px; margin-bottom: 24px; }

  .tab-bar {
    display: flex; gap: 0; overflow-x: auto; border-bottom: 1px solid #333;
    margin-bottom: 20px; -webkit-overflow-scrolling: touch;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0; padding: 10px 14px; cursor: pointer; border: none; background: none;
    font-family: inherit; font-size: 13px; font-weight: 600; color: #666;
    border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap;
    position: relative;
  }
  .tab:hover { color: #aaa; }
  .tab.active { color: var(--mc); border-bottom-color: var(--mc); }

  /* Timer bar under active tab */
  .tab.active::after {
    content: ''; position: absolute; bottom: -2px; left: 0; height: 2px;
    background: var(--mc); opacity: 0.4;
    animation: timer-fill 4s linear forwards;
  }
  @keyframes timer-fill { from { width: 0; } to { width: 100%; } }

  .panel { display: none; opacity: 0; transition: opacity 0.3s ease; }
  .panel.active { display: block; opacity: 1; }

  .panel-card {
    border: 1px solid #333; border-radius: 16px; background: #1e1e1e;
    padding: 24px; overflow: hidden;
  }
  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .model-icon { font-size: 26px; }
  .model-name { font-size: 20px; font-weight: 700; color: var(--mc); }
  .subtitle { font-family: monospace; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .tagline { font-style: italic; font-size: 14px; color: #888; margin-bottom: 16px; font-family: Georgia, serif; }
  .stats-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; background: rgba(30,30,30,0.6);
    padding: 16px;
  }
  .stat-label { font-family: monospace; font-size: 9px; text-transform: uppercase; color: #666; margin-bottom: 2px; }
  .stat-value { font-family: monospace; font-size: 18px; font-weight: 600; }
  .stat-value.colored { color: var(--mc); }
  .progress-wrap { margin-bottom: 18px; }
  .progress-meta { display: flex; justify-content: space-between; font-family: monospace; font-size: 9px; color: #666; margin-bottom: 4px; }
  .progress-bar { width: 100%; height: 5px; background: #333; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; background: var(--mc); }
  .links { display: flex; gap: 20px; }
  .links a { font-family: monospace; font-size: 12px; text-decoration: none; }
  .link-primary { color: var(--mc); }
  .link-secondary { color: #888; }

  /* Play/pause button */
  .controls { display: flex; justify-content: center; margin-top: 12px; gap: 8px; }
  .ctrl-btn {
    background: none; border: 1px solid #444; color: #888; border-radius: 6px;
    padding: 4px 12px; font-size: 11px; cursor: pointer; font-family: monospace;
  }
  .ctrl-btn:hover { border-color: #888; color: #efefef; }
  .ctrl-btn.active { border-color: #efefef; color: #efefef; }
</style>
</head>
<body>
  <h2>Option 4A: Auto-Cycling Tabs + Fade</h2>
  <p class="desc">Auto-advances every 4s with timer bar under tab. Tap any tab to jump. Pause/play control.</p>

  <div class="tab-bar" id="tabBar"></div>
  <div id="panels"></div>
  <div class="controls">
    <button class="ctrl-btn active" id="playPause" onclick="togglePlay()">&#9646;&#9646; Pause</button>
  </div>

  <script>
    const models = [
      { icon: '\u{1F3AC}', name: 'The Scout', sub: 'LLM Matchup Analyst', tag: 'Film room intelligence at machine speed.', color: '#3b82f6', champ: 'Florida', short: 'Scout' },
      { icon: '\u{1F4CA}', name: 'The Quant', sub: 'Monte Carlo Simulation', tag: '10,000 simulations. Zero feelings.', color: '#22c55e', champ: 'Houston', short: 'Quant' },
      { icon: '\u{1F4DC}', name: 'The Historian', sub: 'Archetype Matching', tag: 'Every team has a twin. History already played this game.', color: '#f59e0b', champ: 'Duke', short: 'Historian' },
      { icon: '\u{1F525}', name: 'The Chaos Agent', sub: 'Upset Detector', tag: 'Your bracket is too safe. This one isn\'t.', color: '#ef4444', champ: 'UC San Diego', short: 'Chaos' },
      { icon: '\u{1F3AF}', name: 'The Optimizer', sub: 'ESPN Points Maximizer', tag: 'Every other model predicts games. This one plays the scoring system.', color: '#06b6d4', champ: 'TBD', short: 'Optimizer' },
      { icon: '\u269B', name: 'The Auto Researcher', sub: 'Autonomous Strategy Optimizer', tag: '21 strategies tested. 14 years backtested. One bracket.', color: '#f97316', champ: 'TBD', short: 'Auto' },
    ];

    const tabBar = document.getElementById('tabBar');
    const panelsEl = document.getElementById('panels');

    models.forEach((m, i) => {
      const tab = document.createElement('button');
      tab.className = `tab${i === 0 ? ' active' : ''}`;
      tab.style.setProperty('--mc', m.color);
      tab.innerHTML = `${m.icon} ${m.short}`;
      tab.onclick = () => goTo(i);
      tabBar.appendChild(tab);

      const panel = document.createElement('div');
      panel.className = `panel${i === 0 ? ' active' : ''}`;
      panel.style.setProperty('--mc', m.color);
      panel.innerHTML = `<div class="panel-card">
        <div class="card-header"><span class="model-icon">${m.icon}</span><span class="model-name">${m.name}</span></div>
        <p class="subtitle">${m.sub}</p>
        <p class="tagline">\u201C${m.tag}\u201D</p>
        <div class="stats-grid">
          <div><p class="stat-label">Score</p><p class="stat-value colored">\u2014</p></div>
          <div><p class="stat-label">Accuracy</p><p class="stat-value">\u2014</p></div>
          <div><p class="stat-label">Rank</p><p class="stat-value">\u2014</p></div>
          <div><p class="stat-label">Champion</p><p class="stat-value">${m.champ}</p></div>
        </div>
        <div class="progress-wrap">
          <div class="progress-meta"><span>Progress</span><span>0 / 1920</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
        </div>
        <div class="links">
          <a href="#" class="link-primary">View bracket \u2192</a>
          <a href="#" class="link-secondary">How it works \u2192</a>
        </div>
      </div>`;
      panelsEl.appendChild(panel);
    });

    let current = 0, playing = true, timer;

    function goTo(idx) {
      current = idx;
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
      document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === idx));
      resetTimer();
    }

    function next() { goTo((current + 1) % models.length); }

    function resetTimer() { clearInterval(timer); if (playing) timer = setInterval(next, 4000); }

    function togglePlay() {
      playing = !playing;
      document.getElementById('playPause').innerHTML = playing ? '\u23F8 Pause' : '\u25B6 Play';
      resetTimer();
    }

    timer = setInterval(next, 4000);
  </script>
</body>
</html>
