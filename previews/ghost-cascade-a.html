<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option A: Muted Red Strikethrough</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #141414; color: #efefef; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 24px; }
  .label { font-size: 14px; color: #888; letter-spacing: 0.05em; text-transform: uppercase; }
  h2 { font-size: 20px; font-weight: 600; }
  .card { width: 340px; background: #1e1e1e; border: 1px solid #252525; border-left: 3px solid #3b82f6; border-radius: 8px; overflow: hidden; }
  .row { display: flex; align-items: center; padding: 10px 14px; gap: 10px; position: relative; }
  .row-picked { background: rgba(255,255,255,0.03); }
  .seed { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 4px; background: rgba(255,255,255,0.06); font-size: 11px; font-weight: 600; color: #888; flex-shrink: 0; }
  .team { font-size: 14px; flex: 1; }
  .confidence { font-size: 13px; color: #3b82f6; font-weight: 600; flex-shrink: 0; }
  .check { color: #22c55e; font-size: 14px; flex-shrink: 0; margin-left: 4px; }
  .divider { height: 1px; background: #252525; margin: 0 14px; }
  .note { max-width: 340px; font-size: 13px; color: #888; line-height: 1.5; text-align: center; }

  .ghost { color: rgba(239,68,68,0.5); text-decoration: line-through; }
  .picked { color: #efefef; font-weight: 600; }
</style>
</head>
<body>
  <span class="label">Ghost Cascade Preview</span>
  <h2>Option A: Muted Red Strikethrough</h2>

  <div class="card">
    <div class="row">
      <span class="seed">5</span>
      <span class="team ghost">Marquette</span>
    </div>
    <div class="divider"></div>
    <div class="row row-picked">
      <span class="seed">8</span>
      <span class="team picked">Michigan State</span>
      <span class="check">&#10003;</span>
      <span class="confidence">78%</span>
    </div>
  </div>

  <p class="note">Strongest signal. Red + strikethrough shows team is out.</p>
</body>
</html>
