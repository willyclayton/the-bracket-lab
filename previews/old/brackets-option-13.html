    .model-tab {

      color: #888; border-bottom: 3px solid transparent; transition: all 0.2s;
      white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none;
      font-family: 'Space Grotesk', sans-serif;
    }
    .model-tab:hover { color: #ccc; }
    .model-tab.active { color: #efefef; }
    .tab-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 7px; vertical-align: middle; }

    /* Hint */
    .click-hint {
      max-width: 1400px; margin: 0 auto 20px;
      font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #555;
      display: flex; align-items: center; gap: 8px;
    }
    .click-hint span { color: #888; }

    /* Bracket Container */
    .bracket-scroll-outer {
      max-width: 1400px; margin: 0 auto;
      overflow-x: auto; padding-bottom: 24px;
    }

    .bracket-scroll-outer::-webkit-scrollbar-track { background: #1e1e1e; border-radius: 3px; }
    .bracket-scroll-outer::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    .bracket-full {
      display: flex; align-items: flex-start; gap: 0;

    }

    /* Half brackets */
    .bracket-half { display: flex; flex-direction: column; gap: 20px; }
    .bracket-half-left { flex: 1; }
    .bracket-half-right { flex: 1; flex-direction: column; }

    /* Region block */
    .region-block { padding: 12px; }
    .region-label {
      font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #555;
      text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; text-align: center;
    }

    /* Round row within a region */
    .region-rounds { display: flex; align-items: center; }
    .region-rounds.right { flex-direction: row-reverse; }

    .round-col { display: flex; flex-direction: column; }
    .round-col-label {
      font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #444;
      text-transform: uppercase; letter-spacing: 1px; text-align: center;
      margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #1e1e1e;
    }

    /* Matchup slot — clickable */
    .matchup-slot {
      background: #1a1a1a; border: 1px solid #252525; border-radius: 4px;
      overflow: hidden; cursor: pointer; transition: border-color 0.15s;
      width: 100px; margin: 2px 0; position: relative;
    }
    .matchup-slot:hover { border-color: #444; }
    .matchup-slot.active { border-color: var(--mc, #888); }

      padding: 4px 6px; font-size: 10px; border-bottom: 1px solid #1e1e1e;
    }

    .ms-team.winner .ms-name { color: #efefef; font-weight: 600; }
    .ms-seed { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #555; width: 12px; text-align: right; flex-shrink: 0; }
    .ms-name { font-size: 9px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .ms-dot { width: 3px; height: 3px; border-radius: 50%; flex-shrink: 0; }

    .connector { width: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
    .conn-line { background: #2a2a2a; }
    .conn-h { height: 1px; width: 100%; }
    .conn-v { width: 1px; }

      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      padding: 20px 12px; gap: 16px; flex-shrink: 0; min-width: 180px;

    .ff-title { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1.5px; text-align: center; }

      background: #1e1e1e; border: 1px solid #333; border-radius: 6px;

    .ff-tseed { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #666; width: 14px; text-align: right; }
    .ff-tname { flex: 1; color: #aaa; font-size: 11px; }
    .ff-tdot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }

    .champ-meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #555; margin-top: 3px; }

    .popover-overlay {

    .popover {
      background: #1e1e1e; border: 1px solid #444; border-radius: 12px;
      width: 380px; max-width: 90vw; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6); animation: popIn 0.2s ease;

</head>

// Alias other models to use same bracket structure
['quant','historian','chaos','agent'].forEach(m => {
  BRACKET_DATA[m] = JSON.parse(JSON.stringify(BRACKET_DATA.scout));
  BRACKET_DATA[m].color = MODEL_COLOR[m];
  const champs = {quant:'Houston',historian:'UConn',chaos:'Iowa St',agent:'Gonzaga'};
  BRACKET_DATA[m].champion = champs[m];
  if (m === 'chaos') {
    BRACKET_DATA[m].midwest.r32[0].w = 1;
    BRACKET_DATA[m].midwest.r32[0].conf = 57;
    BRACKET_DATA[m].midwest.r32[0].reasoning = 'Iowa St beats UConn as an 8-seed. The Cyclones are this year\'s sleeper. Greatest upset since NC State 1983.';
    BRACKET_DATA[m].ff.final.w = 1;
  }
});

let currentModel = 'scout';
let activeSlot = null;

function switchModel(model, el, color) {
  currentModel = model;
  document.querySelectorAll('.model-tab').forEach(t => { t.classList.remove('active'); t.style.borderBottomColor='transparent'; t.style.color='#888'; });
  el.classList.add('active');
  el.style.borderBottomColor = color;
  el.style.color = '#efefef';
  renderBracket();
}

function openPopover(data, slotEl) {
  const model = BRACKET_DATA[currentModel];
  const color = model.color;

  if (activeSlot) activeSlot.classList.remove('active');
  slotEl.classList.add('active');
  activeSlot = slotEl;

  document.getElementById('popRound').textContent = data.round || 'Matchup';

  const winnerIdx = data.w;
  const t1 = data.t1, t2 = data.t2;

  document.getElementById('popTeams').innerHTML = `
    <div class="pop-team ${winnerIdx===0?'winner':''}">
      <div class="pop-seed">${t1.s}</div>
      <div class="pop-name">${t1.n}</div>
      ${winnerIdx===0?`<span class="pop-winner-tag" style="background:rgba(${hexToRgb(color)},0.15);color:${color}">Winner</span>`:''}
    </div>
    <div class="pop-team ${winnerIdx===1?'winner':''}">
      <div class="pop-seed">${t2.s}</div>
      <div class="pop-name">${t2.n}</div>
      ${winnerIdx===1?`<span class="pop-winner-tag" style="background:rgba(${hexToRgb(color)},0.15);color:${color}">Winner</span>`:''}
    </div>
  `;

  document.getElementById('popReasoning').textContent = data.reasoning;
  document.getElementById('popConfVal').textContent = data.conf + '%';
  document.getElementById('popConfVal').style.color = color;
  document.getElementById('popConfBar').style.width = data.conf + '%';
  document.getElementById('popConfBar').style.background = color;

  document.getElementById('popoverOverlay').classList.add('open');
}

function closePopover(e) {
  if (e.target === document.getElementById('popoverOverlay')) {
    document.getElementById('popoverOverlay').classList.remove('open');
    if (activeSlot) { activeSlot.classList.remove('active'); activeSlot = null; }
  }
}

function closePopoverBtn() {
  document.getElementById('popoverOverlay').classList.remove('open');
  if (activeSlot) { activeSlot.classList.remove('active'); activeSlot = null; }
}

function buildMatchupSlot(m, round, color) {
  const roundNames = {'r64':'Round of 64','r32':'Round of 32','s16':'Sweet 16','e8':'Elite 8'};
  const roundLabel = roundNames[round] || round;
  const d = {...m, round: roundLabel};
  const idx = Math.random().toString(36).slice(2,8);
  const id = `slot-${idx}`;

  // Store data on element via closure
  return {id, data:d, html: `
    <div class="matchup-slot" id="${id}" style="--mc:${color}">
      <div class="ms-team ${m.w===0?'winner':''}">
        <span class="ms-seed">${m.t1.s}</span>
        <span class="ms-name">${m.t1.n}</span>
        ${m.w===0?`<span class="ms-dot" style="background:${color}"></span>`:''}
      </div>
      <div class="ms-team ${m.w===1?'winner':''}">
        <span class="ms-seed">${m.t2.s}</span>
        <span class="ms-name">${m.t2.n}</span>
        ${m.w===1?`<span class="ms-dot" style="background:${color}"></span>`:''}
      </div>
    </div>
  `};
}

function buildRoundCol(matchups, round, color, width) {
  const roundNames = {'r64':'R64','r32':'R32','s16':'S16','e8':'E8'};
  const label = roundNames[round] || round;
  const slots = matchups.map(m => buildMatchupSlot(m, round, color));

  return {
    slots,
    html: `
      <div class="round-col" style="width:${width || 100}px">
        <div class="round-col-label">${label}</div>
        ${slots.map(s => s.html).join('')}
      </div>
    `
  };
}

function buildRegion(regionKey, isRight, color) {
  const model = BRACKET_DATA[currentModel];
  const region = model[regionKey];
  const allSlots = [];

  const r64 = buildRoundCol(region.r64, 'r64', color);
  const r32 = buildRoundCol(region.r32, 'r32', color);
  const s16 = buildRoundCol(region.s16, 's16', color);
  const e8 = buildRoundCol(region.e8, 'e8', color);

  allSlots.push(...r64.slots, ...r32.slots, ...s16.slots, ...e8.slots);

  const roundsHtml = isRight
    ? `${e8.html}${r32.html}${s16.html}${r64.html}`
    : `${r64.html}${r32.html}${s16.html}${e8.html}`;

  const regionNames = {east:'East',west:'West',south:'South',midwest:'Midwest'};

  return {
    allSlots,
    html: `
      <div class="region-block">
        <div class="region-label">${regionNames[regionKey]}</div>
        <div class="region-rounds ${isRight?'right':''}">
          ${roundsHtml}
        </div>
      </div>
    `
  };
}

function renderBracket() {
  const model = BRACKET_DATA[currentModel];
  const color = model.color;

  const east = buildRegion('east', false, color);
  const west = buildRegion('west', false, color);
  const south = buildRegion('south', true, color);
  const midwest = buildRegion('midwest', true, color);

  const ff = model.ff;
  const s1Idx = Math.random().toString(36).slice(2,8);
  const s2Idx = Math.random().toString(36).slice(2,8);
  const finIdx = Math.random().toString(36).slice(2,8);

  const html = `
    <div class="bracket-half bracket-half-left">
      ${east.html}
      ${west.html}
    </div>
    <div class="ff-center">
      <div class="ff-title">Final Four</div>
      <div class="ff-matchup" id="ff-s1-${s1Idx}" style="--mc:${color}">
        <div class="ff-round-label">Semifinal 1</div>
        <div class="ff-team ${ff.s1.w===0?'winner':''}">
          <span class="ff-tseed">${ff.s1.t1.s}</span>
          <span class="ff-tname">${ff.s1.t1.n}</span>
          ${ff.s1.w===0?`<span class="ff-tdot" style="background:${color}"></span>`:''}
        </div>
        <div class="ff-team ${ff.s1.w===1?'winner':''}">
          <span class="ff-tseed">${ff.s1.t2.s}</span>
          <span class="ff-tname">${ff.s1.t2.n}</span>
          ${ff.s1.w===1?`<span class="ff-tdot" style="background:${color}"></span>`:''}
        </div>
      </div>
      <div class="ff-matchup" id="ff-s2-${s2Idx}" style="--mc:${color}">
        <div class="ff-round-label">Semifinal 2</div>
        <div class="ff-team ${ff.s2.w===0?'winner':''}">
          <span class="ff-tseed">${ff.s2.t1.s}</span>
          <span class="ff-tname">${ff.s2.t1.n}</span>
          ${ff.s2.w===0?`<span class="ff-tdot" style="background:${color}"></span>`:''}
        </div>
        <div class="ff-team ${ff.s2.w===1?'winner':''}">
          <span class="ff-tseed">${ff.s2.t2.s}</span>
          <span class="ff-tname">${ff.s2.t2.n}</span>
          ${ff.s2.w===1?`<span class="ff-tdot" style="background:${color}"></span>`:''}
        </div>
      </div>
      <div class="ff-matchup" id="ff-final-${finIdx}" style="--mc:${color}">
        <div class="ff-round-label">Championship</div>
        <div class="ff-team ${ff.final.w===0?'winner':''}">
          <span class="ff-tseed">${ff.final.t1.s}</span>
          <span class="ff-tname">${ff.final.t1.n}</span>
          ${ff.final.w===0?`<span class="ff-tdot" style="background:${color}"></span>`:''}
        </div>
        <div class="ff-team ${ff.final.w===1?'winner':''}">
          <span class="ff-tseed">${ff.final.t2.s}</span>
          <span class="ff-tname">${ff.final.t2.n}</span>
          ${ff.final.w===1?`<span class="ff-tdot" style="background:${color}"></span>`:''}
        </div>
      </div>
      <div class="champion-card">
        <div class="champ-label">Champion</div>
        <div class="champ-name" style="color:${color}">${model.champion}</div>
        <div class="champ-meta">#1 Seed</div>
      </div>
    </div>
    <div class="bracket-half bracket-half-right">
      ${south.html}
      ${midwest.html}
    </div>
  `;

  document.getElementById('bracketFull').innerHTML = html;

  // Attach click handlers to all matchup slots
  const allSlots = [...east.allSlots, ...west.allSlots, ...south.allSlots, ...midwest.allSlots];
  allSlots.forEach(({id, data}) => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('click', () => openPopover(data, el));
  });

  // FF slots
  document.getElementById(`ff-s1-${s1Idx}`).addEventListener('click', function() { openPopover(ff.s1, this); });
  document.getElementById(`ff-s2-${s2Idx}`).addEventListener('click', function() { openPopover(ff.s2, this); });
  document.getElementById(`ff-final-${finIdx}`).addEventListener('click', function() { openPopover(ff.final, this); });
}

function hexToRgb(hex) {
  if (hex === '#00ff88') return '0,255,136';
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

document.addEventListener('DOMContentLoaded', () => {
  const firstTab = document.querySelector('.model-tab.active');
  if (firstTab) { firstTab.style.borderBottomColor = MODEL_COLOR.scout; firstTab.style.color='#efefef'; }
  renderBracket();
});
</script>
