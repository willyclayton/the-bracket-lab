<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hero Option 2 — Radial Glow</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  body { font-family: 'Space Grotesk', sans-serif; background: #0a0a0f; }
  .mono { font-family: 'Space Mono', monospace; }

  .radial-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse at center, rgba(59,130,246,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes glowPulse {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 1; }
  }
  .glow-orb {
    animation: glowPulse 4s ease-in-out infinite;
  }
  .fade-up-1 { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s both; }
  .fade-up-2 { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.25s both; }
  .fade-up-3 { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.4s both; }
  .fade-up-4 { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.55s both; }

  .btn-primary {
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    box-shadow: 0 0 24px rgba(59,130,246,0.35);
  }
  .btn-primary:hover {
    box-shadow: 0 0 36px rgba(59,130,246,0.5);
    transform: translateY(-1px);
  }
</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center text-white px-6 overflow-hidden relative">

  <div class="fixed top-4 left-4 bg-white/10 text-white/60 text-xs px-3 py-1 rounded-full mono">
    Hero Option 2 — Radial Glow
  </div>

  <!-- Background glow -->
  <div class="radial-glow glow-orb"></div>

  <!-- Subtle noise texture -->
  <div class="fixed inset-0 opacity-[0.03] pointer-events-none"
    style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 256 256%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noise%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noise)%22/%3E%3C/svg%3E')">
  </div>

  <div class="max-w-3xl w-full text-center space-y-8 relative z-10">

    <div class="fade-up-1">
      <span class="mono text-xs tracking-[0.3em] text-blue-400/60 uppercase">The Bracket Lab · 2026</span>
    </div>

    <div class="fade-up-2">
      <h1 class="text-5xl sm:text-7xl font-bold leading-none tracking-tight">
        5 AI Models.<br/>
        <span style="background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
          One Bracket.
        </span>
      </h1>
    </div>

    <div class="fade-up-3">
      <p class="text-lg text-white/50 max-w-xl mx-auto leading-relaxed">
        We ran 5 different AI models on the 2026 NCAA tournament and tracked which one
        actually knew what it was doing.
      </p>
    </div>

    <div class="fade-up-4 flex flex-col sm:flex-row gap-4 justify-center">
      <button class="btn-primary px-8 py-3 text-white font-semibold rounded-lg transition-all duration-200">
        See the brackets
      </button>
      <button class="px-8 py-3 border border-white/15 text-white/60 rounded-lg hover:border-blue-500/40 hover:text-white/80 transition-all">
        How it works
      </button>
    </div>
  </div>

  <div class="fixed bottom-4 right-4 max-w-xs text-right">
    <p class="text-xs text-white/30 mono">Scout-blue radial glow + staggered entrance.<br/>Pulsing glow. Gradient headline text.</p>
  </div>
</body>
</html>
