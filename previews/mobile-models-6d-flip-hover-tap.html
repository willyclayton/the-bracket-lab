<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option 6D: Single Full-Width Flip Cards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #141414; color: #efefef; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; max-width: 420px; margin: 0 auto; }
  h2 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; text-align: center; }
  .desc { text-align: center; color: #666; font-size: 12px; margin-bottom: 24px; }

  .cards { display: flex; flex-direction: column; gap: 10px; }

  .flip-container { perspective: 1000px; height: 140px; cursor: pointer; }
  .flipper {
    position: relative; width: 100%; height: 100%;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }
  .flip-container.flipped .flipper { transform: rotateY(180deg); }

  .front, .back {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border: 1px solid #333; border-radius: 14px; background: #1e1e1e;
    overflow: hidden; display: flex;
  }
  .back { transform: rotateY(180deg); }

  /* Front: overview with left color strip */
  .front-strip { width: 4px; background: var(--mc); flex-shrink: 0; }
  .front-content { flex: 1; padding: 16px 18px; display: flex; flex-direction: column; justify-content: center; }
  .front-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .front-icon { font-size: 24px; }
  .front-name { font-size: 17px; font-weight: 700; color: var(--mc); }
  .front-sub { font-family: monospace; font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 6px; }
  .front-tagline { font-style: italic; font-size: 12px; color: #888; font-family: Georgia, serif; line-height: 1.3; }
  .front-hint { position: absolute; top: 12px; right: 14px; font-family: monospace; font-size: 9px; color: #444; }

  /* Back: stats dashboard with colored top bar */
  .back-bar { height: 3px; background: var(--mc); flex-shrink: 0; width: 100%; position: absolute; top: 0; }
  .back-content { flex: 1; padding: 18px; display: flex; flex-direction: column; justify-content: center; }
  .back-top { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .back-icon { font-size: 18px; }
  .back-name { font-size: 14px; font-weight: 700; color: var(--mc); }

  .back-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .bs-label { font-family: monospace; font-size: 8px; text-transform: uppercase; color: #555; margin-bottom: 2px; }
  .bs-value { font-family: monospace; font-size: 16px; font-weight: 600; }
  .bs-value.colored { color: var(--mc); }

  .back-links { display: flex; gap: 16px; margin-top: 12px; }
  .back-links a { font-family: monospace; font-size: 11px; text-decoration: none; }
  .link-primary { color: var(--mc); }
  .link-secondary { color: #888; }
  .back-hint { position: absolute; top: 12px; right: 14px; font-family: monospace; font-size: 9px; color: #444; }
</style>
</head>
<body>
  <h2>Option 6D: Full-Width Flip Cards</h2>
  <p class="desc">Stacked full-width cards. Front: name + tagline with color strip. Back: 4-stat grid with links. Tap to flip individually.</p>

  <div class="cards" id="cards"></div>

  <script>
    const models = [
      { icon: '\u{1F3AC}', name: 'The Scout', sub: 'LLM Matchup Analyst', tag: 'Film room intelligence at machine speed.', color: '#3b82f6', champ: 'Florida' },
      { icon: '\u{1F4CA}', name: 'The Quant', sub: 'Monte Carlo Simulation', tag: '10,000 simulations. Zero feelings.', color: '#22c55e', champ: 'Houston' },
      { icon: '\u{1F4DC}', name: 'The Historian', sub: 'Archetype Matching', tag: 'Every team has a twin. History already played this game.', color: '#f59e0b', champ: 'Duke' },
      { icon: '\u{1F525}', name: 'The Chaos Agent', sub: 'Upset Detector', tag: 'Your bracket is too safe. This one isn\'t.', color: '#ef4444', champ: 'UC San Diego' },
      { icon: '\u{1F3AF}', name: 'The Optimizer', sub: 'ESPN Points Maximizer', tag: 'Every other model predicts games. This one plays the scoring system.', color: '#06b6d4', champ: 'TBD' },
      { icon: '\u269B', name: 'Auto Researcher', sub: 'Strategy Optimizer', tag: '21 strategies tested. 14 years backtested. One bracket.', color: '#f97316', champ: 'TBD' },
    ];

    const cardsEl = document.getElementById('cards');
    models.forEach(m => {
      const container = document.createElement('div');
      container.className = 'flip-container';
      container.style.setProperty('--mc', m.color);
      container.onclick = () => container.classList.toggle('flipped');
      container.innerHTML = `
        <div class="flipper">
          <div class="front">
            <div class="front-strip"></div>
            <div class="front-content">
              <div class="front-top"><span class="front-icon">${m.icon}</span><span class="front-name">${m.name}</span></div>
              <div class="front-sub">${m.sub}</div>
              <div class="front-tagline">\u201C${m.tag}\u201D</div>
            </div>
            <span class="front-hint">\u21BB</span>
          </div>
          <div class="back">
            <div class="back-bar"></div>
            <div class="back-content">
              <div class="back-top"><span class="back-icon">${m.icon}</span><span class="back-name">${m.name}</span></div>
              <div class="back-stats">
                <div><p class="bs-label">Score</p><p class="bs-value colored">\u2014</p></div>
                <div><p class="bs-label">Accuracy</p><p class="bs-value">\u2014</p></div>
                <div><p class="bs-label">Rank</p><p class="bs-value">\u2014</p></div>
                <div><p class="bs-label">Champion</p><p class="bs-value">${m.champ}</p></div>
              </div>
              <div class="back-links">
                <a href="#" class="link-primary">View bracket \u2192</a>
                <a href="#" class="link-secondary">How it works \u2192</a>
              </div>
            </div>
            <span class="back-hint">\u21BB</span>
          </div>
        </div>`;
      cardsEl.appendChild(container);
    });
  </script>
</body>
</html>
