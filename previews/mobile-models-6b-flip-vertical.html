<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option 6B: Vertical Flip (Stats First)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #141414; color: #efefef; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; max-width: 420px; margin: 0 auto; }
  h2 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; text-align: center; }
  .desc { text-align: center; color: #666; font-size: 12px; margin-bottom: 24px; }

  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

  .flip-container { perspective: 800px; height: 210px; cursor: pointer; }
  .flipper {
    position: relative; width: 100%; height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }
  .flip-container.flipped .flipper { transform: rotateX(180deg); }

  .front, .back {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border: 1px solid #333; border-radius: 14px; background: #1e1e1e;
    padding: 16px; overflow: hidden;
  }
  .back { transform: rotateX(180deg); }

  /* Front: Stats dashboard (what you see first) */
  .front-header { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  .front-icon { font-size: 20px; }
  .front-name { font-size: 14px; font-weight: 700; color: var(--mc); }

  .big-score { font-family: monospace; font-size: 36px; font-weight: 800; color: var(--mc); text-align: center; margin: 8px 0; line-height: 1; }
  .big-score-label { font-family: monospace; font-size: 9px; color: #555; text-transform: uppercase; text-align: center; margin-bottom: 10px; }

  .mini-stats { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .mini-stat { text-align: center; }
  .mini-stat-label { font-family: monospace; font-size: 8px; color: #555; text-transform: uppercase; }
  .mini-stat-value { font-family: monospace; font-size: 13px; font-weight: 600; color: #ccc; }

  .front-progress { width: 100%; height: 4px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
  .front-progress-fill { height: 100%; border-radius: 2px; background: var(--mc); }

  .flip-hint { font-family: monospace; font-size: 9px; color: #555; text-align: center; margin-top: 8px; }

  /* Back: Identity + description */
  .back-icon { font-size: 36px; text-align: center; margin-bottom: 8px; }
  .back-name { font-size: 16px; font-weight: 700; color: var(--mc); text-align: center; margin-bottom: 2px; }
  .back-sub { font-family: monospace; font-size: 9px; color: #666; text-transform: uppercase; text-align: center; margin-bottom: 10px; }
  .back-tagline { font-style: italic; font-size: 12px; color: #888; font-family: Georgia, serif; text-align: center; line-height: 1.4; margin-bottom: 14px; }
  .back-links { display: flex; justify-content: center; gap: 16px; }
  .back-links a { font-family: monospace; font-size: 11px; text-decoration: none; }
  .link-primary { color: var(--mc); }
  .link-secondary { color: #888; }
</style>
</head>
<body>
  <h2>Option 6B: Vertical Flip (Stats First)</h2>
  <p class="desc">Front shows stats with big score number. Back reveals identity + tagline. Flips vertically on tap. Stats-forward design for tournament mode.</p>

  <div class="grid" id="grid"></div>

  <script>
    const models = [
      { icon: '\u{1F3AC}', name: 'The Scout', sub: 'LLM Matchup Analyst', tag: 'Film room intelligence at machine speed.', color: '#3b82f6', champ: 'Florida' },
      { icon: '\u{1F4CA}', name: 'The Quant', sub: 'Monte Carlo Simulation', tag: '10,000 simulations. Zero feelings.', color: '#22c55e', champ: 'Houston' },
      { icon: '\u{1F4DC}', name: 'The Historian', sub: 'Archetype Matching', tag: 'Every team has a twin. History already played this game.', color: '#f59e0b', champ: 'Duke' },
      { icon: '\u{1F525}', name: 'The Chaos Agent', sub: 'Upset Detector', tag: 'Your bracket is too safe. This one isn\'t.', color: '#ef4444', champ: 'UC San Diego' },
      { icon: '\u{1F3AF}', name: 'The Optimizer', sub: 'ESPN Points Maximizer', tag: 'Plays the scoring system, not the games.', color: '#06b6d4', champ: 'TBD' },
      { icon: '\u269B', name: 'Auto Researcher', sub: 'Strategy Optimizer', tag: '21 strategies. 14 years backtested. One bracket.', color: '#f97316', champ: 'TBD' },
    ];

    const grid = document.getElementById('grid');
    models.forEach(m => {
      const container = document.createElement('div');
      container.className = 'flip-container';
      container.style.setProperty('--mc', m.color);
      container.onclick = () => container.classList.toggle('flipped');
      container.innerHTML = `
        <div class="flipper">
          <div class="front">
            <div class="front-header"><span class="front-icon">${m.icon}</span><span class="front-name">${m.name}</span></div>
            <div class="big-score">\u2014</div>
            <div class="big-score-label">points</div>
            <div class="mini-stats">
              <div class="mini-stat"><div class="mini-stat-label">Acc</div><div class="mini-stat-value">\u2014</div></div>
              <div class="mini-stat"><div class="mini-stat-label">Rank</div><div class="mini-stat-value">\u2014</div></div>
              <div class="mini-stat"><div class="mini-stat-label">Champ</div><div class="mini-stat-value">${m.champ}</div></div>
            </div>
            <div class="front-progress"><div class="front-progress-fill" style="width:0%"></div></div>
            <div class="flip-hint">tap for details \u2191</div>
          </div>
          <div class="back">
            <div class="back-icon">${m.icon}</div>
            <div class="back-name">${m.name}</div>
            <div class="back-sub">${m.sub}</div>
            <div class="back-tagline">\u201C${m.tag}\u201D</div>
            <div class="back-links">
              <a href="#" class="link-primary">Bracket \u2192</a>
              <a href="#" class="link-secondary">How it works \u2192</a>
            </div>
          </div>
        </div>`;
      grid.appendChild(container);
    });
  </script>
</body>
</html>
