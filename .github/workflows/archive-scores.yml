name: Archive Scores

on:
  schedule:
    # Every 15 min during game windows (noon-2am ET = 17:00-07:00 UTC)
    - cron: '*/15 17-23 * 3 *'
    - cron: '*/15 0-7 * 3-4 *'
    # Daily fallback
    - cron: '0 8 * 3-4 *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    # Only run during tournament window: March 20 - April 8, 2026
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule')

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch latest scores from API
        run: |
          curl -s -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -X POST "${{ secrets.SITE_URL }}/api/scores" \
            > /dev/null 2>&1 || true

          curl -s "${{ secrets.SITE_URL }}/api/scores" \
            > data/results/actual-results.json

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/results/actual-results.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results/actual-results.json
          git commit -m "chore: archive scores $(date -u +%Y-%m-%d)

          Source: ESPN Scoreboard API via /api/scores
          Automated nightly archive during tournament"
          git push
