<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brackets Option 18 — Dashboard + Dual View</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #141414; color: #efefef; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; overflow-x: hidden; }

    .annotation-badge {
      position: fixed; top: 16px; left: 16px; z-index: 200;
      font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #888;
      text-transform: uppercase; letter-spacing: 1px;
      background: #1e1e1e; border: 1px solid #333; border-radius: 4px;
      padding: 6px 10px; line-height: 1.4;
    }
    .annotation-badge strong { color: #efefef; display: block; font-size: 11px; }

    .page-wrap { max-width: 1100px; margin: 0 auto; padding: 60px 24px 60px; }
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-family: 'Instrument Serif', serif; font-size: 32px; margin-bottom: 4px; }
    .page-header p { color: #888; font-size: 14px; }

    /* Model Tabs */
    .model-tabs { display: flex; border-bottom: 1px solid #333; margin-bottom: 16px; overflow-x: auto; }
    .model-tabs::-webkit-scrollbar { display: none; }
    .model-tab {
      padding: 11px 20px; cursor: pointer; font-size: 13px; font-weight: 600;
      color: #888; border-bottom: 3px solid transparent; transition: all 0.2s;
      white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none;
      font-family: 'Space Grotesk', sans-serif;
    }
    .model-tab:hover { color: #ccc; }
    .model-tab.active { color: #efefef; }
    .tab-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 7px; vertical-align: middle; }

    /* Dashboard Strip */
    .dashboard {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px;
    }
    .dash-box {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px;
      padding: 12px 14px; text-align: center;
    }
    .dash-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .dash-value { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 700; }
    .dash-sub { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #555; margin-top: 2px; }

    /* Toggle + Region + Filters row */
    .controls-row {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      margin-bottom: 16px; flex-wrap: wrap;
    }
    .controls-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    .toggle-wrap {
      display: flex; align-items: center; background: #1e1e1e; border: 1px solid #333;
      border-radius: 6px; overflow: hidden; flex-shrink: 0;
    }
    .toggle-btn {
      padding: 6px 14px; font-size: 11px; font-family: 'IBM Plex Mono', monospace;
      color: #666; cursor: pointer; background: transparent; border: none;
      transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .toggle-btn.active { background: #333; color: #efefef; }

    .region-tabs { display: flex; gap: 6px; }
    .region-tab {
      padding: 6px 14px; border-radius: 18px; border: 1px solid #333; background: transparent;
      color: #888; font-size: 11px; font-weight: 600; cursor: pointer;
      font-family: 'Space Grotesk', sans-serif; transition: all 0.2s;
    }
    .region-tab:hover { border-color: #555; color: #ccc; }
    .region-tab.active { color: #141414; border-color: transparent; }

    /* Filter pills */
    .filter-bar { display: flex; gap: 6px; margin-bottom: 16px; }
    .filter-pill {
      padding: 5px 12px; border-radius: 14px; border: 1px solid #2a2a2a; background: transparent;
      color: #666; font-size: 11px; font-family: 'IBM Plex Mono', monospace; cursor: pointer;
      transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .filter-pill:hover { border-color: #555; color: #aaa; }
    .filter-pill.active { background: #2a2a2a; color: #efefef; border-color: #444; }

    /* Card View */
    .card-view { max-width: 760px; margin: 0 auto; }
    .round-divider { display: flex; align-items: center; gap: 10px; margin: 24px 0 12px; }
    .round-divider:first-child { margin-top: 0; }
    .rd-line { flex: 1; height: 1px; background: #222; }
    .rd-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1.5px; }
    .rd-pts { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #555; }

    .matchup-card {
      background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 8px;
      margin-bottom: 8px; overflow: hidden; cursor: pointer; transition: all 0.2s;
      border-left: 3px solid var(--mc, #888);
    }
    .matchup-card:hover { border-color: #3a3a3a; border-left-color: var(--mc); }
    .matchup-card.open { border-color: #404040; border-left-color: var(--mc); }
    .matchup-card.wrong { border-left-color: #ef4444; border-color: rgba(239,68,68,0.25); }
    .matchup-card.cascade { border-left-color: #555; border-color: #222; opacity: 0.6; }
    .matchup-card.hidden { display: none; }

    .mc-inner { display: flex; align-items: stretch; }
    .mc-teams { flex: 1; }
    .mc-team { display: flex; align-items: center; padding: 10px 14px; gap: 10px; font-size: 13px; border-bottom: 1px solid #252525; }
    .mc-team:last-child { border-bottom: none; }
    .mc-team.winner { background: rgba(255,255,255,0.03); }
    .mc-team.winner .mc-name { font-weight: 600; color: #efefef; }
    .mc-seed { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #888; background: #252525; width: 22px; height: 22px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .mc-name { flex: 1; color: #bbb; }
    .mc-name.wrong-pick { color: #ef4444; text-decoration: line-through; }
    .mc-name.cascade-pick { color: #555; text-decoration: line-through; }
    .mc-badges { display: flex; align-items: center; gap: 6px; padding: 0 10px; }
    .badge-wrong { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #ef4444; background: rgba(239,68,68,0.1); padding: 2px 6px; border-radius: 3px; }
    .badge-elim { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #555; background: rgba(85,85,85,0.15); padding: 2px 6px; border-radius: 3px; }
    .badge-upset { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #f59e0b; background: rgba(245,158,11,0.1); padding: 2px 6px; border-radius: 3px; }
    .mc-side { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 48px; border-left: 1px solid #252525; flex-shrink: 0; gap: 3px; }
    .mc-conf-num { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 500; }
    .mc-conf-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #555; text-transform: uppercase; }
    .mc-expand { display: flex; align-items: center; justify-content: space-between; padding: 7px 14px; border-top: 1px solid #222; color: #666; font-size: 11px; font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }
    .mc-expand svg { transition: transform 0.2s; }
    .matchup-card.open .mc-expand svg { transform: rotate(180deg); }
    .mc-reasoning { display: none; padding: 14px; border-top: 1px solid #222; background: #181818; }
    .matchup-card.open .mc-reasoning { display: block; }
    .mc-reasoning-text { font-size: 13px; color: #aaa; line-height: 1.65; }
    .mc-conf-bar { margin-top: 12px; }
    .mc-cb-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .mc-cb-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #666; text-transform: uppercase; }
    .mc-cb-val { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; }
    .mc-cb-track { height: 3px; background: #2a2a2a; border-radius: 2px; }
    .mc-cb-fill { height: 3px; border-radius: 2px; }

    /* Bracket View */
    .bracket-view { display: none; overflow-x: auto; padding-bottom: 20px; }
    .bracket-view::-webkit-scrollbar { height: 6px; }
    .bracket-view::-webkit-scrollbar-track { background: #1e1e1e; }
    .bracket-view::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    .bracket-grid { display: flex; align-items: flex-start; min-width: 900px; }
    .round-col { display: flex; flex-direction: column; }
    .round-col-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #1e1e1e; }
    .matchup-slot { background: #1a1a1a; border: 1px solid #252525; border-radius: 4px; overflow: hidden; cursor: pointer; transition: border-color 0.15s; width: 120px; margin: 3px 4px; position: relative; }
    .matchup-slot:hover { border-color: #444; }
    .matchup-slot.wrong-slot { border-color: rgba(239,68,68,0.3); }
    .matchup-slot.cascade-slot { opacity: 0.5; }
    .ms-team { display: flex; align-items: center; gap: 4px; padding: 4px 6px; font-size: 10px; border-bottom: 1px solid #1e1e1e; }
    .ms-team:last-child { border-bottom: none; }
    .ms-team.winner { background: rgba(255,255,255,0.04); }
    .ms-team.winner .ms-name { color: #efefef; font-weight: 600; }
    .ms-seed { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #555; width: 12px; text-align: right; flex-shrink: 0; }
    .ms-name { font-size: 9px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .ms-name.wrong-pick { color: #ef4444; text-decoration: line-through; }
    .ms-name.cascade-pick { color: #555; text-decoration: line-through; }
    .ms-dot { width: 3px; height: 3px; border-radius: 50%; flex-shrink: 0; }
    .ms-elim-badge { font-family: 'IBM Plex Mono', monospace; font-size: 7px; color: #555; position: absolute; bottom: 1px; right: 3px; }
    .connector { width: 14px; flex-shrink: 0; }
    .ff-section { text-align: center; padding: 0 12px; min-width: 140px; align-self: center; }
    .ff-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
    .champ-card { background: #1e1e1e; border: 1px solid #444; border-radius: 8px; padding: 14px; text-align: center; margin-top: 12px; }
    .champ-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
    .champ-name { font-family: 'Instrument Serif', serif; font-size: 20px; }

    /* Popover */
    .popover-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; display: none; align-items: center; justify-content: center; }
    .popover-overlay.open { display: flex; }
    .popover { background: #1e1e1e; border: 1px solid #444; border-radius: 12px; width: 380px; max-width: 90vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.6); animation: popIn 0.2s ease; }
    @keyframes popIn { from { opacity: 0; transform: scale(0.94) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .pop-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #2a2a2a; }
    .pop-round { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .pop-close { width: 28px; height: 28px; border-radius: 50%; background: #2a2a2a; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #888; font-size: 16px; }
    .pop-close:hover { background: #333; color: #efefef; }
    .pop-teams { padding: 16px 20px; border-bottom: 1px solid #2a2a2a; }
    .pop-team { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #252525; }
    .pop-team:last-child { border-bottom: none; }
    .pop-seed-box { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #888; background: #2a2a2a; width: 26px; height: 26px; border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .pop-name { flex: 1; font-size: 15px; font-weight: 500; color: #bbb; }
    .pop-team.winner .pop-name { color: #efefef; font-weight: 700; }
    .pop-winner-tag { font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 500; }
    .pop-reasoning { padding: 16px 20px; border-bottom: 1px solid #2a2a2a; }
    .pop-reas-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .pop-reas-text { font-size: 13px; color: #aaa; line-height: 1.65; }
    .pop-conf { padding: 14px 20px; }
    .pop-conf-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .pop-conf-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    .pop-conf-val { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; }
    .pop-conf-track { height: 5px; background: #2a2a2a; border-radius: 3px; }
    .pop-conf-fill { height: 5px; border-radius: 3px; }
    .pop-result { padding: 10px 20px; border-top: 1px solid #2a2a2a; display: flex; align-items: center; gap: 8px; }
    .pop-result-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    .pop-result-badge { font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 600; }

    @media (max-width: 768px) {
      .page-wrap { padding: 60px 12px 48px; }
      .dashboard { grid-template-columns: repeat(3, 1fr); }
      .controls-row { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="annotation-badge">
  <strong>Option 18</strong>
  Dashboard + Dual View
</div>

<!-- Popover -->
<div class="popover-overlay" id="popoverOverlay" onclick="if(event.target===this)closePopover()">
  <div class="popover">
    <div class="pop-header">
      <span class="pop-round" id="popRound"></span>
      <button class="pop-close" onclick="closePopover()">&#x2715;</button>
    </div>
    <div class="pop-teams" id="popTeams"></div>
    <div class="pop-reasoning">
      <div class="pop-reas-label">Model Reasoning</div>
      <div class="pop-reas-text" id="popReasoning"></div>
    </div>
    <div class="pop-conf">
      <div class="pop-conf-header">
        <span class="pop-conf-label">Confidence</span>
        <span class="pop-conf-val" id="popConfVal"></span>
      </div>
      <div class="pop-conf-track"><div class="pop-conf-fill" id="popConfBar"></div></div>
    </div>
    <div class="pop-result">
      <span class="pop-result-label">Result</span>
      <span class="pop-result-badge" id="popResult"></span>
    </div>
  </div>
</div>

<div class="page-wrap">
  <div class="page-header">
    <h1>2026 Brackets</h1>
    <p>Five AI models. Full dashboard stats, card filters, and ESPN-style bracket view.</p>
  </div>

  <!-- Model Tabs -->
  <div class="model-tabs" id="modelTabs">
    <button class="model-tab active" style="border-bottom-color:#3b82f6" data-model="scout" data-color="#3b82f6" onclick="switchModel(this)"><span class="tab-dot" style="background:#3b82f6"></span>The Scout</button>
    <button class="model-tab" data-model="quant" data-color="#22c55e" onclick="switchModel(this)"><span class="tab-dot" style="background:#22c55e"></span>The Quant</button>
    <button class="model-tab" data-model="historian" data-color="#f59e0b" onclick="switchModel(this)"><span class="tab-dot" style="background:#f59e0b"></span>The Historian</button>
    <button class="model-tab" data-model="chaos" data-color="#ef4444" onclick="switchModel(this)"><span class="tab-dot" style="background:#ef4444"></span>Chaos Agent</button>
    <button class="model-tab" data-model="agent" data-color="#00ff88" onclick="switchModel(this)"><span class="tab-dot" style="background:#00ff88"></span>The Agent</button>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="dash-box"><div class="dash-label">Score</div><div class="dash-value" id="dScore" style="color:#3b82f6">720</div><div class="dash-sub">of 1920</div></div>
    <div class="dash-box"><div class="dash-label">Accuracy</div><div class="dash-value" id="dAcc">68%</div><div class="dash-sub">43 / 63</div></div>
    <div class="dash-box"><div class="dash-label">Champion</div><div class="dash-value" id="dChamp" style="color:#3b82f6;font-size:15px">Duke</div><div class="dash-sub">(1) East</div></div>
    <div class="dash-box"><div class="dash-label">Upsets Called</div><div class="dash-value" id="dUpsets">6</div><div class="dash-sub">3 correct</div></div>
    <div class="dash-box"><div class="dash-label">Best Round</div><div class="dash-value" id="dBest" style="font-size:13px">Sweet 16</div><div class="dash-sub">160 pts</div></div>
  </div>

  <!-- Controls Row -->
  <div class="controls-row">
    <div class="controls-left">
      <div class="toggle-wrap">
        <button class="toggle-btn active" id="toggleCards" onclick="setView('cards')">Cards</button>
        <button class="toggle-btn" id="toggleBracket" onclick="setView('bracket')">Bracket</button>
      </div>
      <div class="region-tabs" id="regionTabs">
        <button class="region-tab active" data-region="east" onclick="switchRegion(this)">East</button>
        <button class="region-tab" data-region="west" onclick="switchRegion(this)">West</button>
        <button class="region-tab" data-region="south" onclick="switchRegion(this)">South</button>
        <button class="region-tab" data-region="midwest" onclick="switchRegion(this)">Midwest</button>
        <button class="region-tab" data-region="ff" onclick="switchRegion(this)">Final Four</button>
      </div>
    </div>
  </div>

  <!-- Filter Bar (cards only) -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-pill active" data-filter="all" onclick="setFilter(this)">All</button>
    <button class="filter-pill" data-filter="upsets" onclick="setFilter(this)">Upsets</button>
    <button class="filter-pill" data-filter="wrong" onclick="setFilter(this)">Wrong</button>
    <button class="filter-pill" data-filter="highconf" onclick="setFilter(this)">High Confidence</button>
  </div>

  <div class="card-view" id="cardView"></div>
  <div class="bracket-view" id="bracketView"></div>
</div>

<script>
const MC = { scout:'#3b82f6', quant:'#22c55e', historian:'#f59e0b', chaos:'#ef4444', agent:'#00ff88' };
const CHAMPS = { scout:'Duke', quant:'Houston', historian:'Kentucky', chaos:'NM State', agent:'Auburn' };

  scout:{score:720,acc:'68%',sub:'43 / 63',upsets:6,uCorrect:3,best:'Sweet 16',bestPts:'160 pts'},
  quant:{score:680,acc:'65%',sub:'41 / 63',upsets:3,uCorrect:1,best:'Round of 32',bestPts:'100 pts'},

  agent:{score:700,acc:'67%',sub:'42 / 63',upsets:5,uCorrect:3,best:'Sweet 16',bestPts:'140 pts'}
};

const WRONG = { scout: { east: { r64: { 4: true, 6: true }, r32: { 1: 'Elim. R1' } } } };

const BRACKET = {
  scout: {
    east: {
      r64: [

        {t1:{s:3,n:'Purdue'},t2:{s:14,n:'Longwood'},w:0,conf:88,reason:'Edey is unguardable. Boilermakers by 22.',upset:false},
        {t1:{s:7,n:'Florida'},t2:{s:10,n:'Colorado'},w:0,conf:62,reason:'Florida\'s three-point shooting edges Colorado.',upset:false},
        {t1:{s:2,n:'UConn'},t2:{s:15,n:'Stetson'},w:0,conf:95,reason:'UConn brings championship composure.',upset:false}
      ],
      r32: [
        {t1:{s:1,n:'Duke'},t2:{s:8,n:'Michigan St'},w:0,conf:71,reason:'Duke\'s guard play wins a physical battle.',upset:false},
        {t1:{s:11,n:'VCU'},t2:{s:4,n:'Kansas'},w:0,conf:61,reason:'VCU upsets Kansas with relentless pressure.',upset:true},
        {t1:{s:5,n:'Gonzaga'},t2:{s:3,n:'Purdue'},w:1,conf:55,reason:'Purdue\'s size beats Gonzaga.',upset:false},
        {t1:{s:7,n:'Florida'},t2:{s:2,n:'UConn'},w:1,conf:74,reason:'UConn\'s defense stifles Florida.',upset:false}
      ],
      s16: [
        {t1:{s:1,n:'Duke'},t2:{s:11,n:'VCU'},w:0,conf:67,reason:'Duke pulls away from VCU.',upset:false},

['quant','historian','chaos','agent'].forEach(m => { BRACKET[m] = JSON.parse(JSON.stringify(BRACKET.scout)); });

let currentModel = 'scout', currentRegion = 'east', currentView = 'cards', currentFilter = 'all';

function switchModel(el) {
  currentModel = el.dataset.model;
  const c = el.dataset.color;
  document.querySelectorAll('.model-tab').forEach(t => { t.classList.remove('active'); t.style.borderBottomColor='transparent'; });
  el.classList.add('active'); el.style.borderBottomColor = c;
  const s = STATS[currentModel];
  document.getElementById('dScore').textContent = s.score; document.getElementById('dScore').style.color = c;
  document.getElementById('dAcc').textContent = s.acc; document.querySelector('#dAcc').parentElement.querySelector('.dash-sub').textContent = s.sub;
  document.getElementById('dChamp').textContent = CHAMPS[currentModel]; document.getElementById('dChamp').style.color = c;
  document.getElementById('dUpsets').textContent = s.upsets; document.querySelector('#dUpsets').parentElement.querySelector('.dash-sub').textContent = s.uCorrect+' correct';
  document.getElementById('dBest').textContent = s.best; document.querySelector('#dBest').parentElement.querySelector('.dash-sub').textContent = s.bestPts;
  document.querySelectorAll('.region-tab.active').forEach(t => { t.style.background = c; t.style.color = '#141414'; });
  renderView();
}

function switchRegion(el) {
  currentRegion = el.dataset.region;
  const c = MC[currentModel];
  document.querySelectorAll('.region-tab').forEach(t => { t.classList.remove('active'); t.style.background='transparent'; t.style.color='#888'; });
  el.classList.add('active'); el.style.background = c; el.style.color = '#141414';
  renderCards();
}

function setView(view) {
  currentView = view;
  document.getElementById('toggleCards').classList.toggle('active', view==='cards');
  document.getElementById('toggleBracket').classList.toggle('active', view==='bracket');
  document.getElementById('cardView').style.display = view==='cards' ? 'block' : 'none';
  document.getElementById('bracketView').style.display = view==='bracket' ? 'block' : 'none';
  document.getElementById('regionTabs').style.display = view==='cards' ? 'flex' : 'none';
  document.getElementById('filterBar').style.display = view==='cards' ? 'flex' : 'none';
  renderView();
}

function setFilter(el) {
  currentFilter = el.dataset.filter;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function applyFilter() {
  document.querySelectorAll('.matchup-card').forEach(card => {
    const f = currentFilter;
    if (f === 'all') { card.classList.remove('hidden'); return; }
    const isUpset = card.dataset.upset === 'true';
    const isWrongCard = card.classList.contains('wrong') || card.classList.contains('cascade');
    const isHighConf = parseInt(card.dataset.conf) >= 80;
    if (f === 'upsets' && !isUpset) card.classList.add('hidden'); else if (f === 'upsets') card.classList.remove('hidden');
    if (f === 'wrong' && !isWrongCard) card.classList.add('hidden'); else if (f === 'wrong') card.classList.remove('hidden');
    if (f === 'highconf' && !isHighConf) card.classList.add('hidden'); else if (f === 'highconf') card.classList.remove('hidden');
  });
}

function isWrong(region, round, idx) {
  const w = WRONG[currentModel];
  if (!w || !w[region] || !w[region][round]) return false;
  return w[region][round][idx];
}

function renderCards() {
  const data = BRACKET[currentModel];
  const color = MC[currentModel];
  const container = document.getElementById('cardView');

  if (currentRegion === 'ff') {
    const ff = data.ff;
    let html = '<div class="round-divider"><span class="rd-line"></span><span class="rd-label">Final Four</span><span class="rd-line"></span><span class="rd-pts">160 pts</span></div>';
    [ff.s1,ff.s2].forEach(m => { html += buildCard(m,color,false,false); });
    html += '<div class="round-divider"><span class="rd-line"></span><span class="rd-label">Championship</span><span class="rd-line"></span><span class="rd-pts">320 pts</span></div>';
    html += buildCard(ff.final,color,false,false);
    container.innerHTML = html;
    applyFilter();
    return;
  }

  const region = data[currentRegion];
  const rounds = [{key:'r64',label:'Round of 64',pts:'10 pts'},{key:'r32',label:'Round of 32',pts:'20 pts'},{key:'s16',label:'Sweet 16',pts:'40 pts'},{key:'e8',label:'Elite 8',pts:'80 pts'}];
  let html = '';
  rounds.forEach(r => {
    if (!region[r.key] || !region[r.key].length) return;
    html += `<div class="round-divider"><span class="rd-line"></span><span class="rd-label">${r.label}</span><span class="rd-line"></span><span class="rd-pts">${r.pts}</span></div>`;
    region[r.key].forEach((m,idx) => {
      const ws = isWrong(currentRegion, r.key, idx);
      html += buildCard(m, color, ws===true, typeof ws==='string'?ws:false);
    });
  });
  container.innerHTML = html;
  applyFilter();
}

function buildCard(m, color, isWrongPick, cascadeLabel) {
  const cardClass = isWrongPick ? 'matchup-card wrong' : (cascadeLabel ? 'matchup-card cascade' : 'matchup-card');
  let badges = '';
  if (isWrongPick) badges = '<span class="badge-wrong">WRONG</span>';
  if (cascadeLabel) badges = `<span class="badge-elim">${cascadeLabel}</span>`;
  if (m.upset && !isWrongPick && !cascadeLabel) badges += '<span class="badge-upset">UPSET</span>';
  const wnc = isWrongPick ? 'mc-name wrong-pick' : (cascadeLabel ? 'mc-name cascade-pick' : 'mc-name');

  return `
    <div class="${cardClass}" style="--mc:${color}" data-upset="${!!m.upset}" data-conf="${m.conf}" onclick="this.classList.toggle('open')">
      <div class="mc-inner">
        <div class="mc-teams">
          <div class="mc-team ${m.w===0?'winner':''}">
            <span class="mc-seed">${m.t1.s}</span>
            <span class="${m.w===0?wnc:'mc-name'}">${m.t1.n}</span>
            ${m.w===0&&!isWrongPick&&!cascadeLabel?`<span style="color:${color}">&#10003;</span>`:''}
          </div>
          <div class="mc-team ${m.w===1?'winner':''}">
            <span class="mc-seed">${m.t2.s}</span>
            <span class="${m.w===1?wnc:'mc-name'}">${m.t2.n}</span>
            ${m.w===1&&!isWrongPick&&!cascadeLabel?`<span style="color:${color}">&#10003;</span>`:''}
          </div>
        </div>
        <div class="mc-badges">${badges}</div>
        <div class="mc-side">
          <div class="mc-conf-num" style="color:${color}">${m.conf}%</div>
          <div class="mc-conf-label">Conf</div>
        </div>
      </div>
      <div class="mc-expand"><span>Reasoning</span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>
      <div class="mc-reasoning">
        <div class="mc-reasoning-text">${m.reason}</div>
        <div class="mc-conf-bar">
          <div class="mc-cb-header"><span class="mc-cb-label">Confidence</span><span class="mc-cb-val" style="color:${color}">${m.conf}%</span></div>
          <div class="mc-cb-track"><div class="mc-cb-fill" style="width:${m.conf}%;background:${color}"></div></div>
        </div>
      </div>
    </div>`;
}

function renderBracket() {
  const data = BRACKET[currentModel];
  const color = MC[currentModel];
  const container = document.getElementById('bracketView');
  const rks = ['r64','r32','s16','e8'];
  const rl = {r64:'R64',r32:'R32',s16:'S16',e8:'E8'};
  let html = '<div class="bracket-grid">';

  html += '<div style="display:flex;flex-direction:column;gap:24px">';
  ['east','west'].forEach(reg => {
    html += `<div><div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1.5px;text-align:center;margin-bottom:8px">${reg}</div><div style="display:flex;align-items:flex-start">`;
    rks.forEach(rk => {
      const ms = data[reg][rk]||[];
      const sp = rk==='r64'?3:rk==='r32'?12:rk==='s16'?30:60;
      html += `<div class="round-col"><div class="round-col-label">${rl[rk]}</div>`;
      ms.forEach((m,idx) => {
        const ws = isWrong(reg,rk,idx);
        const sc = ws===true?'matchup-slot wrong-slot':(typeof ws==='string'?'matchup-slot cascade-slot':'matchup-slot');
        const wnc = ws===true?'ms-name wrong-pick':(typeof ws==='string'?'ms-name cascade-pick':'ms-name');
        html += `<div class="${sc}" style="--mc:${color};margin-top:${idx>0?sp:0}px" onclick='openPopover(${JSON.stringify(m)},"${rl[rk]}")'>
          <div class="ms-team ${m.w===0?'winner':''}"><span class="ms-seed">${m.t1.s}</span><span class="${m.w===0?wnc:'ms-name'}">${m.t1.n}</span>${m.w===0&&!ws?`<span class="ms-dot" style="background:${color}"></span>`:''}</div>
          <div class="ms-team ${m.w===1?'winner':''}"><span class="ms-seed">${m.t2.s}</span><span class="${m.w===1?wnc:'ms-name'}">${m.t2.n}</span>${m.w===1&&!ws?`<span class="ms-dot" style="background:${color}"></span>`:''}</div>
          ${typeof ws==='string'?`<span class="ms-elim-badge">${ws}</span>`:''}
        </div>`;
      });
      html += '</div><div class="connector"></div>';
    });
    html += '</div></div>';
  });
  html += '</div>';

  const ff = data.ff;
  html += '<div class="ff-section"><div class="ff-label">Final Four</div>';
  [ff.s1,ff.s2].forEach(m => {
    html += `<div class="matchup-slot" style="--mc:${color};width:140px;margin:8px auto" onclick='openPopover(${JSON.stringify(m)},"Final Four")'><div class="ms-team ${m.w===0?'winner':''}"><span class="ms-seed">${m.t1.s}</span><span class="ms-name">${m.t1.n}</span>${m.w===0?`<span class="ms-dot" style="background:${color}"></span>`:''}</div><div class="ms-team ${m.w===1?'winner':''}"><span class="ms-seed">${m.t2.s}</span><span class="ms-name">${m.t2.n}</span>${m.w===1?`<span class="ms-dot" style="background:${color}"></span>`:''}</div></div>`;
  });
  html += `<div class="matchup-slot" style="--mc:${color};width:140px;margin:12px auto;border-color:#444" onclick='openPopover(${JSON.stringify(ff.final)},"Championship")'><div class="ms-team ${ff.final.w===0?'winner':''}"><span class="ms-seed">${ff.final.t1.s}</span><span class="ms-name">${ff.final.t1.n}</span>${ff.final.w===0?`<span class="ms-dot" style="background:${color}"></span>`:''}</div><div class="ms-team ${ff.final.w===1?'winner':''}"><span class="ms-seed">${ff.final.t2.s}</span><span class="ms-name">${ff.final.t2.n}</span>${ff.final.w===1?`<span class="ms-dot" style="background:${color}"></span>`:''}</div></div>`;
  html += `<div class="champ-card"><div class="champ-label">Champion</div><div class="champ-name" style="color:${color}">${CHAMPS[currentModel]}</div></div></div>`;

  html += '<div style="display:flex;flex-direction:column;gap:24px">';
  ['south','midwest'].forEach(reg => {
    html += `<div><div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1.5px;text-align:center;margin-bottom:8px">${reg}</div><div style="display:flex;align-items:flex-start;flex-direction:row-reverse">`;
    rks.forEach(rk => {
      const ms = data[reg][rk]||[];
      const sp = rk==='r64'?3:rk==='r32'?12:rk==='s16'?30:60;
      html += `<div class="round-col"><div class="round-col-label">${rl[rk]}</div>`;
      ms.forEach((m,idx) => {
        const ws = isWrong(reg,rk,idx);
        const sc = ws===true?'matchup-slot wrong-slot':(typeof ws==='string'?'matchup-slot cascade-slot':'matchup-slot');
        const wnc = ws===true?'ms-name wrong-pick':(typeof ws==='string'?'ms-name cascade-pick':'ms-name');
        html += `<div class="${sc}" style="--mc:${color};margin-top:${idx>0?sp:0}px" onclick='openPopover(${JSON.stringify(m)},"${rl[rk]}")'>
          <div class="ms-team ${m.w===0?'winner':''}"><span class="ms-seed">${m.t1.s}</span><span class="${m.w===0?wnc:'ms-name'}">${m.t1.n}</span>${m.w===0&&!ws?`<span class="ms-dot" style="background:${color}"></span>`:''}</div>
          <div class="ms-team ${m.w===1?'winner':''}"><span class="ms-seed">${m.t2.s}</span><span class="${m.w===1?wnc:'ms-name'}">${m.t2.n}</span>${m.w===1&&!ws?`<span class="ms-dot" style="background:${color}"></span>`:''}</div>
          ${typeof ws==='string'?`<span class="ms-elim-badge">${ws}</span>`:''}
        </div>`;
      });
      html += '</div><div class="connector"></div>';
    });
    html += '</div></div>';
  });
  html += '</div></div>';
  container.innerHTML = html;
}

function openPopover(m, roundLabel) {
  const color = MC[currentModel];
  document.getElementById('popRound').textContent = roundLabel;
  document.getElementById('popTeams').innerHTML = `
    <div class="pop-team ${m.w===0?'winner':''}"><div class="pop-seed-box">${m.t1.s}</div><div class="pop-name">${m.t1.n}</div>${m.w===0?`<span class="pop-winner-tag" style="background:rgba(255,255,255,0.08);color:${color}">Pick</span>`:''}</div>
    <div class="pop-team ${m.w===1?'winner':''}"><div class="pop-seed-box">${m.t2.s}</div><div class="pop-name">${m.t2.n}</div>${m.w===1?`<span class="pop-winner-tag" style="background:rgba(255,255,255,0.08);color:${color}">Pick</span>`:''}</div>`;
  document.getElementById('popReasoning').textContent = m.reason;
  document.getElementById('popConfVal').textContent = m.conf+'%'; document.getElementById('popConfVal').style.color = color;
  document.getElementById('popConfBar').style.width = m.conf+'%'; document.getElementById('popConfBar').style.background = color;
  document.getElementById('popResult').textContent = 'Correct'; document.getElementById('popResult').style.background = '#1a2a1a'; document.getElementById('popResult').style.color = '#22c55e';
  document.getElementById('popoverOverlay').classList.add('open');
}
function closePopover() { document.getElementById('popoverOverlay').classList.remove('open'); }
function renderView() { renderCards(); renderBracket(); }

document.querySelector('.region-tab.active').style.background = MC.scout; document.querySelector('.region-tab.active').style.color = '#141414';
