<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog Option 20 — Two-tier Layout</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #141414;
      --surface: #1e1e1e;
      --border: #333333;
      --muted: #888888;
      --text: #efefef;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    .annotation-badge {
      position: fixed;
      top: 16px;
      left: 16px;
      background: #000;
      border: 1px solid var(--border);
      padding: 6px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      z-index: 100;
    }

    .nav {
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 56px;
    }
    .nav-logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      color: var(--text);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 24px;
      list-style: none;
      margin-left: auto;
    }
    .nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; }
    .nav-links a.active { color: var(--text); }

    .page-header {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 32px 0;
    }
    .page-header h1 { font-size: 32px; font-weight: 700; margin-bottom: 6px; }
    .page-header p { color: var(--muted); font-size: 14px; }

    .tabs {
      max-width: 1100px;
      margin: 24px auto 0;
      padding: 0 32px;
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--text); }

    .content-area {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 32px 64px;
      transition: opacity 0.15s ease;
    }
    .content-area.fading { opacity: 0; }

    /* Hero row */
    .hero-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 40px;
    }

    .hero-card {
      height: 380px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .hero-card:hover { transform: translateY(-2px); }

    .hero-img-area {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 180px;
    }

    .hero-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 24px;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.6) 50%, transparent 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      height: 100%;
    }

    .hero-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .cat-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .cat-pill.analysis { background: rgba(59,130,246,0.18); color: #3b82f6; }
    .cat-pill.recap { background: rgba(34,197,94,0.18); color: #22c55e; }
    .cat-pill.obituary { background: rgba(239,68,68,0.18); color: #ef4444; }
    .cat-pill.preview { background: rgba(245,158,11,0.18); color: #f59e0b; }

    .hero-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .hero-title {
      font-family: 'Instrument Serif', serif;
      font-size: 24px;
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .hero-excerpt {
      font-size: 13px;
      color: rgba(239,239,239,0.7);
      line-height: 1.5;
    }

    /* Compact list */
    .compact-list {
      border-top: 1px solid var(--border);
    }
    .compact-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
    }
    .compact-row:hover {
      background: rgba(255,255,255,0.02);
    }

    .compact-date {
      width: 80px;
      flex-shrink: 0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .compact-pill {
      flex-shrink: 0;
    }

    .compact-title {
      flex: 1;
      font-family: 'Instrument Serif', serif;
      font-size: 16px;
      line-height: 1.3;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .compact-link {
      flex-shrink: 0;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .compact-link:hover { color: var(--text); }

    .bg-analysis { background: linear-gradient(135deg, #0f3460, #16213e, #1a1a2e); }
    .bg-recap { background: linear-gradient(135deg, #0a2010, #0f2a15, #101e10); }
    .bg-obituary { background: linear-gradient(135deg, #280808, #1a0404, #120000); }
    .bg-preview { background: linear-gradient(135deg, #1f1500, #2a1d00, #1a1200); }

    @media (max-width: 900px) {
      .hero-row { grid-template-columns: 1fr; }
      .hero-card { height: 300px; }
    }
    @media (max-width: 600px) {
      .page-header, .tabs, .content-area { padding-left: 16px; padding-right: 16px; }
      .hero-card { height: 260px; }
      .hero-title { font-size: 20px; }
      .compact-title { white-space: normal; font-size: 14px; }
      .compact-date { width: 60px; font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="annotation-badge">Option 20 — Two-tier Layout</div>

  <nav class="nav">
    <a class="nav-logo" href="#">THE BRACKET LAB</a>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Brackets</a></li>
      <li><a href="#" class="active">Blog</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1>The Lab Notes</h1>
    <p>Recaps, analysis, and the occasional eulogy from 5 AI models competing in March Madness 2026.</p>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-filter="all">All</button>
    <button class="tab" data-filter="recap">Recaps</button>
    <button class="tab" data-filter="obituary">Obituaries</button>
    <button class="tab" data-filter="analysis">Analysis</button>
    <button class="tab" data-filter="preview">Previews</button>
  </div>

  <div class="content-area" id="content"></div>

  <script>
    const posts = [
      { title: "Sweet 16 Preview: Which Models Still Have a Shot?", date: "Mar 26", category: "preview", excerpt: "Three models enter the Sweet 16 with viable brackets. We break down who's still in contention and whose path to glory just got a lot narrower." },
      { title: "The Quant's Monte Carlo Meltdown", date: "Mar 24", category: "obituary", excerpt: "10,000 simulations weren't enough. The Quant's predicted champion fell in the second round to a 10-seed it gave a 6% chance. A postmortem of probabilistic hubris." },
      { title: "Eulogy for The Historian: Death by 12-Seed", date: "Mar 22", category: "obituary", excerpt: "The Historian found a historical twin for every team. Unfortunately, the 2014 Mercer Bears archetype showed up and ended its championship hopes two rounds early." },
      { title: "Round of 64, Day 1: Chaos Reigns", date: "Mar 20", category: "recap", excerpt: "The Chaos Agent called 3 of 4 first-round upsets. The Agent went rogue and got two right by accident. Day 1 belongs to the contrarians." },
      { title: "The Scout's Film Room: Breaking Down the East Region", date: "Mar 16", category: "recap", excerpt: "The Scout analyzed 400+ hours of game footage to build its East Region bracket. Here's what the film room revealed about the most dangerous 5-seed." },
      { title: "Selection Sunday Reactions: Surprises and Snubs", date: "Mar 15", category: "analysis", excerpt: "The bracket is set. All 5 models weigh in on the committee's decisions — who got snubbed, who's overseeded, and which region is the group of death." },
      { title: "The Agent Goes Rogue: An Autonomous Bracket Experiment", date: "Mar 12", category: "analysis", excerpt: "We gave an AI agent one instruction: build a bracket. No prompts, no guardrails, no predefined methodology. What it built surprised even us." },
      { title: "How We Built 5 AI Models to Destroy Your Bracket", date: "Mar 10", category: "analysis", excerpt: "The origin story of The Bracket Lab. Five AI models, five completely different approaches to March Madness, and one question: can machines beat your bracket?" }
    ];

    const gradientMap = { analysis: 'bg-analysis', recap: 'bg-recap', obituary: 'bg-obituary', preview: 'bg-preview' };

    function heroCardHTML(post) {
      return `<div class="hero-card ${gradientMap[post.category]}">
        <div class="hero-overlay">
          <div style="margin-top:auto;">
            <div class="hero-meta">
              <span class="cat-pill ${post.category}">${post.category}</span>
              <span class="hero-date">${post.date}</span>
            </div>
            <div class="hero-title">${post.title}</div>
            <div class="hero-excerpt">${post.excerpt}</div>
          </div>
        </div>
      </div>`;
    }

    function compactRowHTML(post) {
      return `<div class="compact-row">
        <span class="compact-date">${post.date}</span>
        <span class="compact-pill"><span class="cat-pill ${post.category}">${post.category}</span></span>
        <span class="compact-title">${post.title}</span>
        <a href="#" class="compact-link">Read &rarr;</a>
      </div>`;
    }

    function render(filter) {
      const filtered = filter === 'all' ? posts : posts.filter(p => p.category === filter);
      if (filtered.length === 0) { document.getElementById('content').innerHTML = '<p style="color:var(--muted);text-align:center;padding:48px 0;">No posts in this category yet.</p>'; return; }

      let html = '';

      // Hero row: first 2 posts (or 1 if only 1)
      const heroCount = Math.min(2, filtered.length);
      if (heroCount === 2) {
        html += `<div class="hero-row">${heroCardHTML(filtered[0])}${heroCardHTML(filtered[1])}</div>`;
      } else {
        html += `<div class="hero-row" style="grid-template-columns:1fr">${heroCardHTML(filtered[0])}</div>`;
      }

      // Compact list for remaining
      const rest = filtered.slice(heroCount);
      if (rest.length > 0) {
        html += '<div class="compact-list">';
        rest.forEach(p => { html += compactRowHTML(p); });
        html += '</div>';
      }

      document.getElementById('content').innerHTML = html;
    }

    document.getElementById('tabs').addEventListener('click', e => {
      if (!e.target.classList.contains('tab')) return;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      e.target.classList.add('active');
      const area = document.getElementById('content');
      area.classList.add('fading');
      setTimeout(() => { render(e.target.dataset.filter); area.classList.remove('fading'); }, 150);
    });

    render('all');
  </script>
</body>
</html>
