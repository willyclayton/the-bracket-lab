<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Brackets Option 20 — Side-by-side Desktop</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #141414; color: #efefef; font-family: 'Space Grotesk', sans-serif; min-height: 100vh; overflow-x: hidden; }

    .annotation-badge {
      position: fixed; top: 16px; left: 16px; z-index: 200;
      font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #888;
      text-transform: uppercase; letter-spacing: 1px;
      background: #1e1e1e; border: 1px solid #333; border-radius: 4px;
      padding: 6px 10px; line-height: 1.4;
    }
    .annotation-badge strong { color: #efefef; display: block; font-size: 11px; }

    .page-wrap { max-width: 1400px; margin: 0 auto; padding: 60px 24px 60px; }
    .page-header { margin-bottom: 20px; }
    .page-header h1 { font-family: 'Instrument Serif', serif; font-size: 32px; margin-bottom: 4px; }
    .page-header p { color: #888; font-size: 14px; }

    /* Model Tabs */
    .model-tabs { display: flex; border-bottom: 1px solid #333; margin-bottom: 0; overflow-x: auto; }
    .model-tabs::-webkit-scrollbar { display: none; }
    .model-tab {
      padding: 11px 20px; cursor: pointer; font-size: 13px; font-weight: 600;
      color: #888; border-bottom: 3px solid transparent; transition: all 0.2s;
      white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none;
      font-family: 'Space Grotesk', sans-serif;
    }
    .model-tab:hover { color: #ccc; }
    .model-tab.active { color: #efefef; }
    .tab-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 7px; vertical-align: middle; }

    /* Summary Strip */
    .summary-strip {
      display: flex; align-items: center; background: #1a1a1a; border: 1px solid #2a2a2a;
      border-top: none; padding: 8px 0; margin-bottom: 16px;
    }
    .ss-item {
      flex: 1; text-align: center; padding: 0 12px;
      border-right: 1px solid #2a2a2a;
      font-family: 'IBM Plex Mono', monospace;
    }
    .ss-item:last-child { border-right: none; }
    .ss-label { font-size: 9px; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .ss-value { font-size: 13px; font-weight: 600; }

    /* ============ DESKTOP SIDE-BY-SIDE ============ */
    .dual-panel {
      display: none; /* hidden on mobile by default */
      gap: 16px;
    }

    /* Left: Cards Panel */
    .cards-panel {
      width: 40%; flex-shrink: 0;
      border: 1px solid #2a2a2a; border-radius: 8px; background: #1a1a1a;
      overflow: hidden; display: flex; flex-direction: column; max-height: calc(100vh - 220px);
    }
    .cards-panel-header {
      padding: 10px 14px; border-bottom: 1px solid #2a2a2a;
      display: flex; align-items: center; gap: 8px;
    }
    .region-tab {
      padding: 5px 12px; border-radius: 14px; border: 1px solid #333; background: transparent;
      color: #888; font-size: 11px; font-weight: 600; cursor: pointer;
      font-family: 'Space Grotesk', sans-serif; transition: all 0.2s;
    }
    .region-tab:hover { border-color: #555; color: #ccc; }
    .region-tab.active { color: #141414; border-color: transparent; }
    .cards-scroll {
      flex: 1; overflow-y: auto; padding: 12px;
    }
    .cards-scroll::-webkit-scrollbar { width: 4px; }
    .cards-scroll::-webkit-scrollbar-track { background: transparent; }
    .cards-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* Right: Bracket Panel */
    .bracket-panel {
      flex: 1; border: 1px solid #2a2a2a; border-radius: 8px; background: #1a1a1a;
      overflow: hidden; display: flex; flex-direction: column; max-height: calc(100vh - 220px);
    }
    .bracket-panel-header {
      padding: 10px 14px; border-bottom: 1px solid #2a2a2a;
      font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #555;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .bracket-scroll {
      flex: 1; overflow: auto; padding: 12px;
    }
    .bracket-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
    .bracket-scroll::-webkit-scrollbar-track { background: transparent; }
    .bracket-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* ============ MOBILE TOGGLE ============ */
    .mobile-controls {
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .toggle-wrap {
      display: flex; align-items: center; background: #1e1e1e; border: 1px solid #333;
      border-radius: 6px; overflow: hidden; flex-shrink: 0;
    }
    .toggle-btn {
      padding: 6px 14px; font-size: 11px; font-family: 'IBM Plex Mono', monospace;
      color: #666; cursor: pointer; background: transparent; border: none;
      transition: all 0.2s; text-transform: uppercase;
    }
    .toggle-btn.active { background: #333; color: #efefef; }
    .mobile-region-tabs { display: flex; gap: 6px; }
    .mobile-card-view { }
    .mobile-bracket-view { display: none; overflow-x: auto; padding-bottom: 16px; }

    /* ============ SHARED: Cards ============ */
    .round-divider { display: flex; align-items: center; gap: 8px; margin: 18px 0 10px; }
    .round-divider:first-child { margin-top: 0; }
    .rd-line { flex: 1; height: 1px; background: #252525; }
    .rd-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }

    .matchup-card {
      background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 6px;
      margin-bottom: 6px; overflow: hidden; cursor: pointer; transition: all 0.2s;
      border-left: 3px solid var(--mc, #888);
    }
    .matchup-card:hover { border-color: #3a3a3a; border-left-color: var(--mc); }
    .matchup-card.open { border-color: #404040; border-left-color: var(--mc); }
    .matchup-card.wrong { border-left-color: #ef4444; border-color: rgba(239,68,68,0.25); }
    .matchup-card.cascade { border-left-color: #555; border-color: #222; opacity: 0.6; }
    .matchup-card.highlight { border-color: var(--mc) !important; box-shadow: 0 0 0 1px var(--mc); }

    .mc-inner { display: flex; align-items: stretch; }
    .mc-teams { flex: 1; }
    .mc-team { display: flex; align-items: center; padding: 8px 12px; gap: 8px; font-size: 12px; border-bottom: 1px solid #252525; }
    .mc-team:last-child { border-bottom: none; }
    .mc-team.winner { background: rgba(255,255,255,0.03); }
    .mc-team.winner .mc-name { font-weight: 600; color: #efefef; }
    .mc-seed { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #888; background: #252525; width: 20px; height: 20px; border-radius: 3px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .mc-name { flex: 1; color: #bbb; font-size: 12px; }
    .mc-name.wrong-pick { color: #ef4444; text-decoration: line-through; }
    .mc-name.cascade-pick { color: #555; text-decoration: line-through; }
    .mc-badges { display: flex; align-items: center; gap: 4px; padding: 0 8px; }
    .badge-wrong { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: #ef4444; background: rgba(239,68,68,0.1); padding: 2px 5px; border-radius: 3px; }
    .badge-elim { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: #555; background: rgba(85,85,85,0.15); padding: 2px 5px; border-radius: 3px; }
    .mc-side { display: flex; align-items: center; justify-content: center; width: 40px; border-left: 1px solid #252525; flex-shrink: 0; }
    .mc-conf-num { font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500; }
    .mc-reasoning { display: none; padding: 10px 12px; border-top: 1px solid #222; background: #181818; }
    .matchup-card.open .mc-reasoning { display: block; }
    .mc-reasoning-text { font-size: 12px; color: #888; line-height: 1.6; }
    .mc-conf-bar { margin-top: 8px; }
    .mc-cb-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
    .mc-cb-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: #555; text-transform: uppercase; }
    .mc-cb-val { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600; }
    .mc-cb-track { height: 2px; background: #252525; border-radius: 1px; }
    .mc-cb-fill { height: 2px; border-radius: 1px; }

    /* ============ SHARED: Bracket ============ */
    .bracket-grid { display: flex; align-items: flex-start; min-width: 850px; }
    .round-col { display: flex; flex-direction: column; }
    .round-col-label { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: #444; text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 4px; }
    .matchup-slot {
      background: #1e1e1e; border: 1px solid #252525; border-radius: 3px;
      overflow: hidden; cursor: pointer; transition: all 0.15s;
      width: 110px; margin: 2px 3px; position: relative;
    }
    .matchup-slot:hover { border-color: #444; }
    .matchup-slot.wrong-slot { border-color: rgba(239,68,68,0.3); }
    .matchup-slot.cascade-slot { opacity: 0.5; }
    .matchup-slot.highlight { border-color: var(--mc) !important; box-shadow: 0 0 0 1px var(--mc); }
    .ms-team { display: flex; align-items: center; gap: 3px; padding: 3px 5px; font-size: 9px; border-bottom: 1px solid #1a1a1a; }
    .ms-team:last-child { border-bottom: none; }
    .ms-team.winner { background: rgba(255,255,255,0.04); }
    .ms-team.winner .ms-name { color: #ddd; font-weight: 600; }
    .ms-seed { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: #555; width: 11px; text-align: right; flex-shrink: 0; }
    .ms-name { font-size: 9px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .ms-name.wrong-pick { color: #ef4444; text-decoration: line-through; }
    .ms-name.cascade-pick { color: #555; text-decoration: line-through; }
    .ms-dot { width: 3px; height: 3px; border-radius: 50%; flex-shrink: 0; }
    .ms-elim-badge { font-family: 'IBM Plex Mono', monospace; font-size: 7px; color: #555; position: absolute; bottom: 1px; right: 2px; }
    .connector { width: 10px; flex-shrink: 0; }
    .ff-section { text-align: center; padding: 0 8px; min-width: 120px; align-self: center; }
    .ff-label { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: #444; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
    .champ-card { background: transparent; border: 1px solid #333; border-radius: 6px; padding: 10px; text-align: center; margin-top: 8px; }
    .champ-label { font-family: 'IBM Plex Mono', monospace; font-size: 8px; color: #555; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px; }
    .champ-name { font-family: 'Instrument Serif', serif; font-size: 16px; }

    /* Popover */
    .popover-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300; display: none; align-items: center; justify-content: center; }
    .popover-overlay.open { display: flex; }
    .popover { background: #1e1e1e; border: 1px solid #444; border-radius: 12px; width: 380px; max-width: 90vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.6); animation: popIn 0.2s ease; }
    @keyframes popIn { from { opacity: 0; transform: scale(0.94) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    .pop-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #2a2a2a; }
    .pop-round { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .pop-close { width: 28px; height: 28px; border-radius: 50%; background: #2a2a2a; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #888; font-size: 16px; }
    .pop-close:hover { background: #333; color: #efefef; }
    .pop-teams { padding: 16px 20px; border-bottom: 1px solid #2a2a2a; }
    .pop-team { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #252525; }
    .pop-team:last-child { border-bottom: none; }
    .pop-seed-box { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #888; background: #2a2a2a; width: 26px; height: 26px; border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .pop-name { flex: 1; font-size: 15px; font-weight: 500; color: #bbb; }
    .pop-team.winner .pop-name { color: #efefef; font-weight: 700; }
    .pop-winner-tag { font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 500; }
    .pop-reasoning { padding: 16px 20px; border-bottom: 1px solid #2a2a2a; }
    .pop-reas-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .pop-reas-text { font-size: 13px; color: #aaa; line-height: 1.65; }
    .pop-conf { padding: 14px 20px; }
    .pop-conf-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .pop-conf-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    .pop-conf-val { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; }
    .pop-conf-track { height: 5px; background: #2a2a2a; border-radius: 3px; }
    .pop-conf-fill { height: 5px; border-radius: 3px; }

    /* ============ RESPONSIVE ============ */
    @media (min-width: 1024px) {
      .dual-panel { display: flex; }
      .mobile-controls { display: none; }
      .mobile-card-view { display: none !important; }
      .mobile-bracket-view { display: none !important; }
    }
    @media (max-width: 1023px) {
      .dual-panel { display: none !important; }
      .mobile-controls { display: flex; }
      .page-wrap { padding: 60px 12px 48px; }
    }
  </style>
</head>
<body>

<div class="annotation-badge">
  <strong>Option 20</strong>
  Side-by-side Desktop
</div>

<!-- Popover -->
<div class="popover-overlay" id="popoverOverlay" onclick="if(event.target===this)closePopover()">
  <div class="popover">
    <div class="pop-header">
      <span class="pop-round" id="popRound"></span>
      <button class="pop-close" onclick="closePopover()">&#x2715;</button>
    </div>
    <div class="pop-teams" id="popTeams"></div>
    <div class="pop-reasoning">
      <div class="pop-reas-label">Model Reasoning</div>
      <div class="pop-reas-text" id="popReasoning"></div>
    </div>
    <div class="pop-conf">
      <div class="pop-conf-header">
        <span class="pop-conf-label">Confidence</span>
        <span class="pop-conf-val" id="popConfVal"></span>
      </div>
      <div class="pop-conf-track"><div class="pop-conf-fill" id="popConfBar"></div></div>
    </div>
  </div>
</div>

<div class="page-wrap">
  <div class="page-header">
    <h1>2026 Brackets</h1>
    <p>Side-by-side card stack and bracket view. Click any matchup to cross-highlight.</p>
  </div>

  <!-- Model Tabs -->
  <div class="model-tabs" id="modelTabs">
    <button class="model-tab active" style="border-bottom-color:#3b82f6" data-model="scout" data-color="#3b82f6" onclick="switchModel(this)"><span class="tab-dot" style="background:#3b82f6"></span>The Scout</button>
    <button class="model-tab" data-model="quant" data-color="#22c55e" onclick="switchModel(this)"><span class="tab-dot" style="background:#22c55e"></span>The Quant</button>
    <button class="model-tab" data-model="historian" data-color="#f59e0b" onclick="switchModel(this)"><span class="tab-dot" style="background:#f59e0b"></span>The Historian</button>
    <button class="model-tab" data-model="chaos" data-color="#ef4444" onclick="switchModel(this)"><span class="tab-dot" style="background:#ef4444"></span>Chaos Agent</button>
    <button class="model-tab" data-model="agent" data-color="#00ff88" onclick="switchModel(this)"><span class="tab-dot" style="background:#00ff88"></span>The Agent</button>
  </div>

  <!-- Summary Strip -->
  <div class="summary-strip">
    <div class="ss-item"><div class="ss-label">Score</div><div class="ss-value" id="ssScore" style="color:#3b82f6">720</div></div>
    <div class="ss-item"><div class="ss-label">Accuracy</div><div class="ss-value" id="ssAcc">68%</div></div>
    <div class="ss-item"><div class="ss-label">Champion</div><div class="ss-value" id="ssChamp" style="color:#3b82f6">Duke</div></div>
    <div class="ss-item"><div class="ss-label">Upsets</div><div class="ss-value" id="ssUpsets">6</div></div>
  </div>

  <!-- ============ DESKTOP: Side-by-side ============ -->
  <div class="dual-panel" id="dualPanel">
    <!-- Left: Cards -->
    <div class="cards-panel">
      <div class="cards-panel-header" id="desktopRegionTabs">
        <button class="region-tab active" data-region="east" onclick="switchRegion(this)">East</button>
        <button class="region-tab" data-region="west" onclick="switchRegion(this)">West</button>
        <button class="region-tab" data-region="south" onclick="switchRegion(this)">South</button>
        <button class="region-tab" data-region="midwest" onclick="switchRegion(this)">Midwest</button>
        <button class="region-tab" data-region="ff" onclick="switchRegion(this)">FF</button>
      </div>
      <div class="cards-scroll" id="desktopCards"></div>
    </div>
    <!-- Right: Bracket -->
    <div class="bracket-panel">
      <div class="bracket-panel-header">Full Bracket</div>
      <div class="bracket-scroll" id="desktopBracket"></div>
    </div>
  </div>

  <!-- ============ MOBILE: Toggle ============ -->
  <div class="mobile-controls" id="mobileControls">
    <div class="toggle-wrap">
      <button class="toggle-btn active" id="mToggleCards" onclick="mSetView('cards')">Cards</button>
      <button class="toggle-btn" id="mToggleBracket" onclick="mSetView('bracket')">Bracket</button>
    </div>
    <div class="mobile-region-tabs" id="mobileRegionTabs">
      <button class="region-tab active" data-region="east" onclick="switchRegion(this)">East</button>
      <button class="region-tab" data-region="west" onclick="switchRegion(this)">West</button>
      <button class="region-tab" data-region="south" onclick="switchRegion(this)">South</button>
      <button class="region-tab" data-region="midwest" onclick="switchRegion(this)">Midwest</button>
      <button class="region-tab" data-region="ff" onclick="switchRegion(this)">FF</button>
    </div>
  </div>
  <div class="mobile-card-view" id="mobileCards"></div>
  <div class="mobile-bracket-view" id="mobileBracket"></div>
</div>

<script>
const MC = { scout:'#3b82f6', quant:'#22c55e', historian:'#f59e0b', chaos:'#ef4444', agent:'#00ff88' };
const CHAMPS = { scout:'Duke', quant:'Houston', historian:'Kentucky', chaos:'NM State', agent:'Auburn' };
const STATS = {
  scout:{score:720,acc:'68%',upsets:6}, quant:{score:680,acc:'65%',upsets:3},
  historian:{score:740,acc:'70%',upsets:4}, chaos:{score:560,acc:'52%',upsets:12}, agent:{score:700,acc:'67%',upsets:5}
};
const WRONG = { scout: { east: { r64: { 4: true, 6: true }, r32: { 1: 'Elim. R1' } } } };

const BRACKET = {
  scout: {
    east: {
      r64: [
        {t1:{s:1,n:'Duke'},t2:{s:16,n:'Hampton'},w:0,conf:97,reason:'Duke\'s elite defense dominates Hampton.'},
        {t1:{s:8,n:'Michigan St'},t2:{s:9,n:'Memphis'},w:0,conf:55,reason:'Izzo\'s tournament IQ edges this matchup.'},
        {t1:{s:5,n:'Gonzaga'},t2:{s:12,n:'McNeese'},w:0,conf:72,reason:'Gonzaga\'s depth breaks down McNeese.'},
        {t1:{s:4,n:'Kansas'},t2:{s:13,n:'Colgate'},w:0,conf:81,reason:'Kansas controls the paint.'},
        {t1:{s:6,n:'Illinois'},t2:{s:11,n:'VCU'},w:1,conf:58,reason:'VCU\'s HAVOC defense causes upsets.'},
        {t1:{s:3,n:'Purdue'},t2:{s:14,n:'Longwood'},w:0,conf:88,reason:'Edey is unguardable. Boilermakers by 22.'},
        {t1:{s:7,n:'Florida'},t2:{s:10,n:'Colorado'},w:0,conf:62,reason:'Florida\'s shooting edges Colorado.'},
        {t1:{s:2,n:'UConn'},t2:{s:15,n:'Stetson'},w:0,conf:95,reason:'UConn brings championship composure.'}
      ],
      r32: [
        {t1:{s:1,n:'Duke'},t2:{s:8,n:'Michigan St'},w:0,conf:71,reason:'Duke\'s guard play wins.'},
        {t1:{s:11,n:'VCU'},t2:{s:4,n:'Kansas'},w:0,conf:61,reason:'VCU upsets Kansas.'},
        {t1:{s:5,n:'Gonzaga'},t2:{s:3,n:'Purdue'},w:1,conf:55,reason:'Purdue\'s size wins.'},
        {t1:{s:7,n:'Florida'},t2:{s:2,n:'UConn'},w:1,conf:74,reason:'UConn stifles Florida.'}
      ],
      s16: [
        {t1:{s:1,n:'Duke'},t2:{s:11,n:'VCU'},w:0,conf:67,reason:'Duke pulls away.'},
        {t1:{s:3,n:'Purdue'},t2:{s:2,n:'UConn'},w:1,conf:58,reason:'UConn\'s experience wins.'}
      ],
      e8: [{t1:{s:1,n:'Duke'},t2:{s:2,n:'UConn'},w:0,conf:61,reason:'Duke rises to the moment.'}]
    },
    west: {
      r64: [
        {t1:{s:1,n:'Houston'},t2:{s:16,n:'N. Kentucky'},w:0,conf:98,reason:'Houston\'s defense is elite.'},
        {t1:{s:8,n:'Texas Tech'},t2:{s:9,n:'Nevada'},w:0,conf:54,reason:'Texas Tech edges Nevada.'},
        {t1:{s:5,n:'Baylor'},t2:{s:12,n:'UAB'},w:0,conf:76,reason:'Baylor overwhelms UAB.'},

['quant','historian','chaos','agent'].forEach(m => { BRACKET[m] = JSON.parse(JSON.stringify(BRACKET.scout)); });

let currentModel = 'scout', currentRegion = 'east', mobileView = 'cards';

function switchModel(el) {
  currentModel = el.dataset.model;
  const c = el.dataset.color;
  document.querySelectorAll('.model-tab').forEach(t => { t.classList.remove('active'); t.style.borderBottomColor='transparent'; });
  el.classList.add('active'); el.style.borderBottomColor = c;
  const s = STATS[currentModel];
  document.getElementById('ssScore').textContent = s.score; document.getElementById('ssScore').style.color = c;
  document.getElementById('ssAcc').textContent = s.acc;
  document.getElementById('ssChamp').textContent = CHAMPS[currentModel]; document.getElementById('ssChamp').style.color = c;
  document.getElementById('ssUpsets').textContent = s.upsets;
  document.querySelectorAll('.region-tab.active').forEach(t => { t.style.background = c; t.style.color = '#141414'; });
  renderAll();
}

function switchRegion(el) {
  currentRegion = el.dataset.region;
  const c = MC[currentModel];
  document.querySelectorAll('.region-tab').forEach(t => { t.classList.remove('active'); t.style.background='transparent'; t.style.color='#888'; });
  // Update all region tab groups
  document.querySelectorAll(`.region-tab[data-region="${currentRegion}"]`).forEach(t => {
    t.classList.add('active'); t.style.background = c; t.style.color = '#141414';
  });
  renderCards('desktopCards');
  renderCards('mobileCards');
}

function mSetView(view) {
  mobileView = view;
  document.getElementById('mToggleCards').classList.toggle('active', view==='cards');
  document.getElementById('mToggleBracket').classList.toggle('active', view==='bracket');
  document.getElementById('mobileCards').style.display = view==='cards' ? 'block' : 'none';
  document.getElementById('mobileBracket').style.display = view==='bracket' ? 'block' : 'none';
  document.getElementById('mobileRegionTabs').style.display = view==='cards' ? 'flex' : 'none';
}

function isWrong(region, round, idx) {
  const w = WRONG[currentModel];
  if (!w || !w[region] || !w[region][round]) return false;
  return w[region][round][idx];
}

function renderCards(containerId) {
  const data = BRACKET[currentModel];
  const color = MC[currentModel];
  const container = document.getElementById(containerId);
  if (!container) return;

  if (currentRegion === 'ff') {
    const ff = data.ff;
    let html = '<div class="round-divider"><span class="rd-line"></span><span class="rd-label">Final Four</span><span class="rd-line"></span></div>';
    [ff.s1,ff.s2].forEach((m,i) => { html += buildCard(m,color,false,false,`ff-s${i}`); });
    html += '<div class="round-divider"><span class="rd-line"></span><span class="rd-label">Championship</span><span class="rd-line"></span></div>';
    html += buildCard(ff.final,color,false,false,'ff-final');
    container.innerHTML = html;
    return;
  }

  const region = data[currentRegion];
  const rounds = [{key:'r64',label:'R64'},{key:'r32',label:'R32'},{key:'s16',label:'S16'},{key:'e8',label:'E8'}];
  let html = '';
  rounds.forEach(r => {
    if (!region[r.key] || !region[r.key].length) return;
    html += `<div class="round-divider"><span class="rd-line"></span><span class="rd-label">${r.label}</span><span class="rd-line"></span></div>`;
    region[r.key].forEach((m,idx) => {
      const ws = isWrong(currentRegion, r.key, idx);
      const id = `${currentRegion}-${r.key}-${idx}`;
      html += buildCard(m, color, ws===true, typeof ws==='string'?ws:false, id);
    });
  });
  container.innerHTML = html;
}

function buildCard(m, color, isWrongPick, cascadeLabel, matchId) {
  const cardClass = isWrongPick ? 'matchup-card wrong' : (cascadeLabel ? 'matchup-card cascade' : 'matchup-card');
  let badges = '';
  if (isWrongPick) badges = '<span class="badge-wrong">WRONG</span>';
  if (cascadeLabel) badges = `<span class="badge-elim">${cascadeLabel}</span>`;
  const wnc = isWrongPick ? 'mc-name wrong-pick' : (cascadeLabel ? 'mc-name cascade-pick' : 'mc-name');

  return `
    <div class="${cardClass}" style="--mc:${color}" data-match="${matchId}" onclick="this.classList.toggle('open');highlightSlot('${matchId}')">
      <div class="mc-inner">
        <div class="mc-teams">
          <div class="mc-team ${m.w===0?'winner':''}">
            <span class="mc-seed">${m.t1.s}</span>
            <span class="${m.w===0?wnc:'mc-name'}">${m.t1.n}</span>
            ${m.w===0&&!isWrongPick&&!cascadeLabel?`<span style="color:${color};font-size:10px">&#10003;</span>`:''}
          </div>
          <div class="mc-team ${m.w===1?'winner':''}">
            <span class="mc-seed">${m.t2.s}</span>
            <span class="${m.w===1?wnc:'mc-name'}">${m.t2.n}</span>
            ${m.w===1&&!isWrongPick&&!cascadeLabel?`<span style="color:${color};font-size:10px">&#10003;</span>`:''}
          </div>
        </div>
        <div class="mc-badges">${badges}</div>
        <div class="mc-side"><div class="mc-conf-num" style="color:${color}">${m.conf}%</div></div>
      </div>
      <div class="mc-reasoning">
        <div class="mc-reasoning-text">${m.reason}</div>
        <div class="mc-conf-bar">
          <div class="mc-cb-header"><span class="mc-cb-label">Confidence</span><span class="mc-cb-val" style="color:${color}">${m.conf}%</span></div>
          <div class="mc-cb-track"><div class="mc-cb-fill" style="width:${m.conf}%;background:${color}"></div></div>
        </div>
      </div>
    </div>`;
}

function highlightSlot(matchId) {
  // Remove existing highlights
  document.querySelectorAll('.matchup-slot.highlight').forEach(el => el.classList.remove('highlight'));
  // Highlight matching bracket slot
  const slot = document.querySelector(`.matchup-slot[data-match="${matchId}"]`);
  if (slot) {
    slot.classList.add('highlight');
    slot.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
  }
}

function highlightCard(matchId) {
  document.querySelectorAll('.matchup-card.highlight').forEach(el => el.classList.remove('highlight'));
  const card = document.querySelector(`.matchup-card[data-match="${matchId}"]`);
  if (card) {
    card.classList.add('highlight');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function renderBracket(containerId) {
  const data = BRACKET[currentModel];
  const color = MC[currentModel];
  const container = document.getElementById(containerId);
  if (!container) return;
  const rks = ['r64','r32','s16','e8'];
  const rl = {r64:'R64',r32:'R32',s16:'S16',e8:'E8'};
  let html = '<div class="bracket-grid">';

  html += '<div style="display:flex;flex-direction:column;gap:20px">';
  ['east','west'].forEach(reg => {
    html += `<div><div style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:#444;text-transform:uppercase;letter-spacing:1.5px;text-align:center;margin-bottom:6px">${reg}</div><div style="display:flex;align-items:flex-start">`;
    rks.forEach(rk => {
      const ms = data[reg][rk]||[];
      const sp = rk==='r64'?2:rk==='r32'?10:rk==='s16'?26:54;
      html += `<div class="round-col"><div class="round-col-label">${rl[rk]}</div>`;
      ms.forEach((m,idx) => {
        const matchId = `${reg}-${rk}-${idx}`;
        const ws = isWrong(reg,rk,idx);
        const sc = ws===true?'matchup-slot wrong-slot':(typeof ws==='string'?'matchup-slot cascade-slot':'matchup-slot');
        const wnc = ws===true?'ms-name wrong-pick':(typeof ws==='string'?'ms-name cascade-pick':'ms-name');
        html += `<div class="${sc}" style="--mc:${color};margin-top:${idx>0?sp:0}px" data-match="${matchId}" onclick="highlightCard('${matchId}');openPopover(${JSON.stringify(m).replace(/"/g,'&quot;')},'${rl[rk]}')">
          <div class="ms-team ${m.w===0?'winner':''}"><span class="ms-seed">${m.t1.s}</span><span class="${m.w===0?wnc:'ms-name'}">${m.t1.n}</span>${m.w===0&&!ws?`<span class="ms-dot" style="background:${color}"></span>`:''}</div>
          <div class="ms-team ${m.w===1?'winner':''}"><span class="ms-seed">${m.t2.s}</span><span class="${m.w===1?wnc:'ms-name'}">${m.t2.n}</span>${m.w===1&&!ws?`<span class="ms-dot" style="background:${color}"></span>`:''}</div>
          ${typeof ws==='string'?`<span class="ms-elim-badge">${ws}</span>`:''}
        </div>`;
      });
      html += '</div><div class="connector"></div>';
    });
    html += '</div></div>';
  });
  html += '</div>';

  const ff = data.ff;
  html += '<div class="ff-section"><div class="ff-label">Final Four</div>';
  [ff.s1,ff.s2].forEach((m,i) => {
    const mid = `ff-s${i}`;
    html += `<div class="matchup-slot" style="--mc:${color};width:120px;margin:6px auto" data-match="${mid}" onclick="highlightCard('${mid}');openPopover(${JSON.stringify(m).replace(/"/g,'&quot;')},'Final Four')"><div class="ms-team ${m.w===0?'winner':''}"><span class="ms-seed">${m.t1.s}</span><span class="ms-name">${m.t1.n}</span>${m.w===0?`<span class="ms-dot" style="background:${color}"></span>`:''}</div><div class="ms-team ${m.w===1?'winner':''}"><span class="ms-seed">${m.t2.s}</span><span class="ms-name">${m.t2.n}</span>${m.w===1?`<span class="ms-dot" style="background:${color}"></span>`:''}</div></div>`;
  });
  html += `<div class="matchup-slot" style="--mc:${color};width:120px;margin:8px auto;border-color:#333" data-match="ff-final" onclick="highlightCard('ff-final');openPopover(${JSON.stringify(ff.final).replace(/"/g,'&quot;')},'Championship')"><div class="ms-team ${ff.final.w===0?'winner':''}"><span class="ms-seed">${ff.final.t1.s}</span><span class="ms-name">${ff.final.t1.n}</span>${ff.final.w===0?`<span class="ms-dot" style="background:${color}"></span>`:''}</div><div class="ms-team ${ff.final.w===1?'winner':''}"><span class="ms-seed">${ff.final.t2.s}</span><span class="ms-name">${ff.final.t2.n}</span>${ff.final.w===1?`<span class="ms-dot" style="background:${color}"></span>`:''}</div></div>`;
  html += `<div class="champ-card"><div class="champ-label">Champion</div><div class="champ-name" style="color:${color}">${CHAMPS[currentModel]}</div></div></div>`;

  html += '<div style="display:flex;flex-direction:column;gap:20px">';
  ['south','midwest'].forEach(reg => {
    html += `<div><div style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:#444;text-transform:uppercase;letter-spacing:1.5px;text-align:center;margin-bottom:6px">${reg}</div><div style="display:flex;align-items:flex-start;flex-direction:row-reverse">`;
    rks.forEach(rk => {
      const ms = data[reg][rk]||[];
      const sp = rk==='r64'?2:rk==='r32'?10:rk==='s16'?26:54;
      html += `<div class="round-col"><div class="round-col-label">${rl[rk]}</div>`;
      ms.forEach((m,idx) => {
        const matchId = `${reg}-${rk}-${idx}`;
        const ws = isWrong(reg,rk,idx);
        const sc = ws===true?'matchup-slot wrong-slot':(typeof ws==='string'?'matchup-slot cascade-slot':'matchup-slot');
        const wnc = ws===true?'ms-name wrong-pick':(typeof ws==='string'?'ms-name cascade-pick':'ms-name');
        html += `<div class="${sc}" style="--mc:${color};margin-top:${idx>0?sp:0}px" data-match="${matchId}" onclick="highlightCard('${matchId}');openPopover(${JSON.stringify(m).replace(/"/g,'&quot;')},'${rl[rk]}')">
          <div class="ms-team ${m.w===0?'winner':''}"><span class="ms-seed">${m.t1.s}</span><span class="${m.w===0?wnc:'ms-name'}">${m.t1.n}</span>${m.w===0&&!ws?`<span class="ms-dot" style="background:${color}"></span>`:''}</div>
          <div class="ms-team ${m.w===1?'winner':''}"><span class="ms-seed">${m.t2.s}</span><span class="${m.w===1?wnc:'ms-name'}">${m.t2.n}</span>${m.w===1&&!ws?`<span class="ms-dot" style="background:${color}"></span>`:''}</div>
          ${typeof ws==='string'?`<span class="ms-elim-badge">${ws}</span>`:''}
        </div>`;
      });
      html += '</div><div class="connector"></div>';
    });
    html += '</div></div>';
  });
  html += '</div></div>';
  container.innerHTML = html;

function openPopover(m, roundLabel) {
  const color = MC[currentModel];
  document.getElementById('popRound').textContent = roundLabel;
  document.getElementById('popTeams').innerHTML = `
    <div class="pop-team ${m.w===0?'winner':''}"><div class="pop-seed-box">${m.t1.s}</div><div class="pop-name">${m.t1.n}</div>${m.w===0?`<span class="pop-winner-tag" style="background:rgba(255,255,255,0.08);color:${color}">Pick</span>`:''}</div>
    <div class="pop-team ${m.w===1?'winner':''}"><div class="pop-seed-box">${m.t2.s}</div><div class="pop-name">${m.t2.n}</div>${m.w===1?`<span class="pop-winner-tag" style="background:rgba(255,255,255,0.08);color:${color}">Pick</span>`:''}</div>`;
  document.getElementById('popReasoning').textContent = m.reason;
  document.getElementById('popConfVal').textContent = m.conf+'%'; document.getElementById('popConfVal').style.color = color;
  document.getElementById('popConfBar').style.width = m.conf+'%'; document.getElementById('popConfBar').style.background = color;
  document.getElementById('popoverOverlay').classList.add('open');
}
function closePopover() { document.getElementById('popoverOverlay').classList.remove('open'); }

function renderAll() {
  renderCards('desktopCards');
  renderCards('mobileCards');
  renderBracket('desktopBracket');
  renderBracket('mobileBracket');
}

// Init
document.querySelectorAll('.region-tab.active').forEach(t => { t.style.background = MC.scout; t.style.color = '#141414'; });
renderAll();
