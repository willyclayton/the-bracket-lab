<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option 6E: Flip Cards in Carousel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #141414; color: #efefef; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px 0; max-width: 420px; margin: 0 auto; }
  h2 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; text-align: center; padding: 0 20px; }
  .desc { text-align: center; color: #666; font-size: 12px; margin-bottom: 24px; padding: 0 20px; }

  .carousel {
    display: flex; gap: 12px; overflow-x: auto; scroll-snap-type: x mandatory;
    padding: 4px 20px 16px; -webkit-overflow-scrolling: touch;
  }
  .carousel::-webkit-scrollbar { display: none; }

  .flip-container {
    perspective: 1000px; height: 260px; width: 280px;
    flex-shrink: 0; scroll-snap-align: center; cursor: pointer;
  }
  .flipper {
    position: relative; width: 100%; height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
  }
  .flip-container.flipped .flipper { transform: rotateY(180deg); }

  .front, .back {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    border: 1px solid #333; border-radius: 16px; background: #1e1e1e;
    padding: 22px; overflow: hidden;
  }
  .back { transform: rotateY(180deg); }

  /* Front: Big identity card */
  .front-icon { font-size: 40px; margin-bottom: 12px; }
  .front-name { font-size: 20px; font-weight: 700; color: var(--mc); margin-bottom: 4px; }
  .front-sub { font-family: monospace; font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .front-tagline { font-style: italic; font-size: 13px; color: #888; font-family: Georgia, serif; line-height: 1.4; margin-bottom: 16px; }
  .front-champ-row { display: flex; align-items: center; gap: 8px; }
  .front-champ-label { font-family: monospace; font-size: 9px; color: #555; text-transform: uppercase; }
  .front-champ-value { font-family: monospace; font-size: 14px; font-weight: 600; color: #ddd; }
  .front-hint { position: absolute; bottom: 14px; right: 16px; font-family: monospace; font-size: 9px; color: #444; }

  /* Colored top accent */
  .front::before, .back::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--mc);
  }

  /* Back: Full stats */
  .back-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
  .back-icon { font-size: 22px; }
  .back-name { font-size: 16px; font-weight: 700; color: var(--mc); }

  .back-stats { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .bs-row { display: flex; justify-content: space-between; align-items: baseline; padding-bottom: 10px; border-bottom: 1px solid #2a2a2a; }
  .bs-row:last-child { border-bottom: none; }
  .bs-label { font-family: monospace; font-size: 10px; text-transform: uppercase; color: #666; }
  .bs-value { font-family: monospace; font-size: 18px; font-weight: 600; }
  .bs-value.colored { color: var(--mc); }

  .back-progress { width: 100%; height: 5px; background: #2a2a2a; border-radius: 3px; overflow: hidden; margin-bottom: 14px; }
  .back-progress-fill { height: 100%; border-radius: 3px; background: var(--mc); }

  .back-links { display: flex; gap: 16px; }
  .back-links a { font-family: monospace; font-size: 11px; text-decoration: none; }
  .link-primary { color: var(--mc); }
  .link-secondary { color: #888; }
  .back-hint { position: absolute; bottom: 14px; right: 16px; font-family: monospace; font-size: 9px; color: #444; }

  /* Dots */
  .dots { display: flex; justify-content: center; gap: 6px; padding: 0 20px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #333; transition: background 0.2s; }
  .dot.active { background: #888; }
</style>
</head>
<body>
  <h2>Option 6E: Flip Cards in Carousel</h2>
  <p class="desc">Swipeable carousel of flip cards. Front: big identity. Back: stats dashboard. Swipe to browse, tap to flip. Best of both worlds.</p>

  <div class="carousel" id="carousel"></div>
  <div class="dots" id="dots"></div>

  <script>
    const models = [
      { icon: '\u{1F3AC}', name: 'The Scout', sub: 'LLM Matchup Analyst', tag: 'Film room intelligence at machine speed.', color: '#3b82f6', champ: 'Florida' },
      { icon: '\u{1F4CA}', name: 'The Quant', sub: 'Monte Carlo Simulation', tag: '10,000 simulations. Zero feelings.', color: '#22c55e', champ: 'Houston' },
      { icon: '\u{1F4DC}', name: 'The Historian', sub: 'Archetype Matching', tag: 'Every team has a twin. History already played this game.', color: '#f59e0b', champ: 'Duke' },
      { icon: '\u{1F525}', name: 'The Chaos Agent', sub: 'Upset Detector', tag: 'Your bracket is too safe. This one isn\'t.', color: '#ef4444', champ: 'UC San Diego' },
      { icon: '\u{1F3AF}', name: 'The Optimizer', sub: 'ESPN Points Maximizer', tag: 'Every other model predicts games. This one plays the scoring system.', color: '#06b6d4', champ: 'TBD' },
      { icon: '\u269B', name: 'Auto Researcher', sub: 'Strategy Optimizer', tag: '21 strategies tested. 14 years backtested. One bracket.', color: '#f97316', champ: 'TBD' },
    ];

    const carousel = document.getElementById('carousel');
    const dotsEl = document.getElementById('dots');

    models.forEach((m, i) => {
      // Dot
      const dot = document.createElement('span');
      dot.className = `dot${i === 0 ? ' active' : ''}`;
      dotsEl.appendChild(dot);

      // Card
      const container = document.createElement('div');
      container.className = 'flip-container';
      container.style.setProperty('--mc', m.color);
      container.onclick = () => container.classList.toggle('flipped');
      container.innerHTML = `
        <div class="flipper">
          <div class="front">
            <div class="front-icon">${m.icon}</div>
            <div class="front-name">${m.name}</div>
            <div class="front-sub">${m.sub}</div>
            <div class="front-tagline">\u201C${m.tag}\u201D</div>
            <div class="front-champ-row">
              <span class="front-champ-label">Champion pick:</span>
              <span class="front-champ-value">${m.champ}</span>
            </div>
            <span class="front-hint">tap to flip \u21BB</span>
          </div>
          <div class="back">
            <div class="back-header"><span class="back-icon">${m.icon}</span><span class="back-name">${m.name}</span></div>
            <div class="back-stats">
              <div class="bs-row"><span class="bs-label">Score</span><span class="bs-value colored">\u2014</span></div>
              <div class="bs-row"><span class="bs-label">Accuracy</span><span class="bs-value">\u2014</span></div>
              <div class="bs-row"><span class="bs-label">Rank</span><span class="bs-value">\u2014</span></div>
              <div class="bs-row"><span class="bs-label">Champion</span><span class="bs-value">${m.champ}</span></div>
            </div>
            <div class="back-progress"><div class="back-progress-fill" style="width:0%"></div></div>
            <div class="back-links">
              <a href="#" class="link-primary">View bracket \u2192</a>
              <a href="#" class="link-secondary">How it works \u2192</a>
            </div>
            <span class="back-hint">tap to flip \u21BB</span>
          </div>
        </div>`;
      carousel.appendChild(container);
    });

    // Update dots on scroll
    const dots = document.querySelectorAll('.dot');
    carousel.addEventListener('scroll', () => {
      const idx = Math.round(carousel.scrollLeft / 292);
      dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    });
  </script>
</body>
</html>
