<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog Option 19 — Inline Filter Pills</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #141414;
      --surface: #1e1e1e;
      --border: #333333;
      --muted: #888888;
      --text: #efefef;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    .annotation-badge {
      position: fixed;
      top: 16px;
      left: 16px;
      background: #000;
      border: 1px solid var(--border);
      padding: 6px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      z-index: 100;
    }

    .nav {
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 56px;
    }
    .nav-logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      color: var(--text);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 24px;
      list-style: none;
      margin-left: auto;
    }
    .nav-links a { font-size: 13px; color: var(--muted); text-decoration: none; }
    .nav-links a.active { color: var(--text); }

    .page-header {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 32px 0;
    }
    .page-header h1 { font-size: 32px; font-weight: 700; margin-bottom: 6px; }
    .page-header p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

    /* Filter pills */
    .filter-pills {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-pill {
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 99px;
      cursor: pointer;
      border: 1px solid;
      background: transparent;
      transition: all 0.2s;
      letter-spacing: 0.3px;
    }
    .filter-pill.all { border-color: rgba(239,239,239,0.3); color: var(--muted); }
    .filter-pill.all.active { background: rgba(239,239,239,0.12); color: var(--text); border-color: rgba(239,239,239,0.5); }
    .filter-pill.recap { border-color: rgba(34,197,94,0.35); color: rgba(34,197,94,0.6); }
    .filter-pill.recap.active { background: rgba(34,197,94,0.15); color: #22c55e; border-color: rgba(34,197,94,0.5); }
    .filter-pill.obituary { border-color: rgba(239,68,68,0.35); color: rgba(239,68,68,0.6); }
    .filter-pill.obituary.active { background: rgba(239,68,68,0.15); color: #ef4444; border-color: rgba(239,68,68,0.5); }
    .filter-pill.analysis { border-color: rgba(59,130,246,0.35); color: rgba(59,130,246,0.6); }
    .filter-pill.analysis.active { background: rgba(59,130,246,0.15); color: #3b82f6; border-color: rgba(59,130,246,0.5); }
    .filter-pill.preview { border-color: rgba(245,158,11,0.35); color: rgba(245,158,11,0.6); }
    .filter-pill.preview.active { background: rgba(245,158,11,0.15); color: #f59e0b; border-color: rgba(245,158,11,0.5); }

    .filter-pill:hover { opacity: 0.9; }

    .content-area {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 32px 64px;
      transition: opacity 0.15s ease;
    }
    .content-area.fading { opacity: 0; }

    /* Magazine grid */
    .top-row {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .mag-card {
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .mag-card:hover { transform: translateY(-2px); }

    .mag-card-bg {
      min-height: 320px;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .mag-overlay {
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 24px;
    }

    .cat-pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .cat-pill.analysis { background: rgba(59,130,246,0.18); color: #3b82f6; }
    .cat-pill.recap { background: rgba(34,197,94,0.18); color: #22c55e; }
    .cat-pill.obituary { background: rgba(239,68,68,0.18); color: #ef4444; }
    .cat-pill.preview { background: rgba(245,158,11,0.18); color: #f59e0b; }

    .mag-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-left: 8px;
    }

    .mag-title {
      font-family: 'Instrument Serif', serif;
      font-size: 24px;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .mag-title.large { font-size: 28px; }
    .mag-excerpt {
      font-size: 13px;
      color: rgba(239,239,239,0.7);
      line-height: 1.5;
    }

    .small-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .small-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
    }
    .small-card:hover { border-color: #555; transform: translateY(-2px); }

    .small-card-top { height: 100px; }
    .small-card-body { padding: 16px; }
    .small-card .mag-title { font-size: 16px; margin-bottom: 6px; }
    .small-card .mag-excerpt { font-size: 12px; }

    .bg-analysis { background: linear-gradient(135deg, #0f3460, #16213e, #1a1a2e); }
    .bg-recap { background: linear-gradient(135deg, #0a2010, #0f2a15, #101e10); }
    .bg-obituary { background: linear-gradient(135deg, #280808, #1a0404, #120000); }
    .bg-preview { background: linear-gradient(135deg, #1f1500, #2a1d00, #1a1200); }

    @media (max-width: 900px) {
      .top-row { grid-template-columns: 1fr; }
      .small-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .page-header, .filter-pills, .content-area { padding-left: 16px; padding-right: 16px; }
      .small-grid { grid-template-columns: 1fr; }
      .mag-card-bg { min-height: 240px; }
    }
  </style>
</head>
<body>
  <div class="annotation-badge">Option 19 — Inline Filter Pills</div>

  <nav class="nav">
    <a class="nav-logo" href="#">THE BRACKET LAB</a>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Brackets</a></li>
      <li><a href="#" class="active">Blog</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1>The Lab Notes</h1>
    <p>Recaps, analysis, and the occasional eulogy from 5 AI models competing in March Madness 2026.</p>
  </div>

  <div class="filter-pills" id="pills">
    <button class="filter-pill all active" data-filter="all">All</button>
    <button class="filter-pill recap" data-filter="recap">Recaps</button>
    <button class="filter-pill obituary" data-filter="obituary">Obituaries</button>
    <button class="filter-pill analysis" data-filter="analysis">Analysis</button>
    <button class="filter-pill preview" data-filter="preview">Previews</button>
  </div>

  <div class="content-area" id="content"></div>

  <script>
    const posts = [
      { title: "Sweet 16 Preview: Which Models Still Have a Shot?", date: "Mar 26", category: "preview", excerpt: "Three models enter the Sweet 16 with viable brackets. We break down who's still in contention and whose path to glory just got a lot narrower." },
      { title: "The Quant's Monte Carlo Meltdown", date: "Mar 24", category: "obituary", excerpt: "10,000 simulations weren't enough. The Quant's predicted champion fell in the second round to a 10-seed it gave a 6% chance." },
      { title: "Eulogy for The Historian: Death by 12-Seed", date: "Mar 22", category: "obituary", excerpt: "The Historian found a historical twin for every team. Unfortunately, the 2014 Mercer Bears archetype showed up and ended its championship hopes two rounds early." },
      { title: "Round of 64, Day 1: Chaos Reigns", date: "Mar 20", category: "recap", excerpt: "The Chaos Agent called 3 of 4 first-round upsets. The Agent went rogue and got two right by accident. Day 1 belongs to the contrarians." },
      { title: "The Scout's Film Room: Breaking Down the East Region", date: "Mar 16", category: "recap", excerpt: "The Scout analyzed 400+ hours of game footage to build its East Region bracket. Here's what the film room revealed about the most dangerous 5-seed." },
      { title: "Selection Sunday Reactions: Surprises and Snubs", date: "Mar 15", category: "analysis", excerpt: "The bracket is set. All 5 models weigh in on the committee's decisions — who got snubbed, who's overseeded, and which region is the group of death." },
      { title: "The Agent Goes Rogue: An Autonomous Bracket Experiment", date: "Mar 12", category: "analysis", excerpt: "We gave an AI agent one instruction: build a bracket. No prompts, no guardrails, no predefined methodology. What it built surprised even us." },
      { title: "How We Built 5 AI Models to Destroy Your Bracket", date: "Mar 10", category: "analysis", excerpt: "The origin story of The Bracket Lab. Five AI models, five completely different approaches to March Madness, and one question: can machines beat your bracket?" }
    ];

    const gradientMap = { analysis: 'bg-analysis', recap: 'bg-recap', obituary: 'bg-obituary', preview: 'bg-preview' };

    function heroCardHTML(post, isLarge) {
      const titleClass = isLarge ? 'mag-title large' : 'mag-title';
      return `<div class="mag-card">
        <div class="mag-card-bg ${gradientMap[post.category]}">
          <div class="mag-overlay">
            <span class="cat-pill ${post.category}">${post.category}</span><span class="mag-date">${post.date}</span>
            <div class="${titleClass}">${post.title}</div>
            <div class="mag-excerpt">${post.excerpt}</div>
          </div>
        </div>
      </div>`;
    }

    function smallCardHTML(post) {
      return `<div class="small-card">
        <div class="small-card-top ${gradientMap[post.category]}"></div>
        <div class="small-card-body">
          <span class="cat-pill ${post.category}">${post.category}</span><span class="mag-date">${post.date}</span>
          <div class="mag-title">${post.title}</div>
          <div class="mag-excerpt">${post.excerpt}</div>
        </div>
      </div>`;
    }

    function render(filter) {
      const filtered = filter === 'all' ? posts : posts.filter(p => p.category === filter);
      if (filtered.length === 0) { document.getElementById('content').innerHTML = '<p style="color:var(--muted);text-align:center;padding:48px 0;">No posts in this category yet.</p>'; return; }

      let html = '';
      if (filtered.length >= 2) {
        html += `<div class="top-row">${heroCardHTML(filtered[0], true)}${heroCardHTML(filtered[1], false)}</div>`;
        if (filtered.length > 2) {
          html += '<div class="small-grid">';
          for (let i = 2; i < filtered.length; i++) html += smallCardHTML(filtered[i]);
          html += '</div>';
        }
      } else {
        html += `<div class="top-row" style="grid-template-columns:1fr">${heroCardHTML(filtered[0], true)}</div>`;
      }

      document.getElementById('content').innerHTML = html;
    }

    document.getElementById('pills').addEventListener('click', e => {
      if (!e.target.classList.contains('filter-pill')) return;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      e.target.classList.add('active');
      const area = document.getElementById('content');
      area.classList.add('fading');
      setTimeout(() => { render(e.target.dataset.filter); area.classList.remove('fading'); }, 150);
    });

    render('all');
  </script>
</body>
</html>
