<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog Option 15 — Category Tabs + Magazine Grid</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #141414;
      --surface: #1e1e1e;
      --border: #333333;
      --muted: #888888;
      --text: #efefef;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    .annotation-badge {
      position: fixed;
      top: 16px;
      left: 16px;
      background: #000;
      border: 1px solid var(--border);
      padding: 6px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      z-index: 100;
    }

    /* Nav */
    .nav {
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 56px;
    }
    .nav-logo {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      color: var(--text);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 24px;
      list-style: none;
      margin-left: auto;
    }
    .nav-links a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
    }
    .nav-links a.active { color: var(--text); }

    /* Page header */
    .page-header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 36px 32px 0;
    }
    .page-header h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }
    .page-header p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    /* Tabs */
    .tabs-bar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 32px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0;
    }
    .tab-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      padding: 10px 20px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:first-child { padding-left: 0; }
    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }
    .tab-btn:hover:not(.active) { color: #ccc; }

    /* Magazine outer */
    .magazine-outer {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 32px 80px;
    }

    /* Top feature row: hero + secondary */
    .feature-row {
      display: grid;
      grid-template-columns: 60% 1fr;
      gap: 2px;
      margin-bottom: 2px;
    }

    /* Hero card */
    .card-hero {
      position: relative;
      height: 420px;
      background: var(--surface);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .card-hero .card-bg {
      position: absolute;
      inset: 0;
      transition: transform 0.4s ease;
    }
    .card-hero:hover .card-bg { transform: scale(1.03); }

    .card-bg-1 { background: linear-gradient(135deg, #0f3460 0%, #16213e 50%, #1a1a2e 100%); }
    .card-bg-2 { background: linear-gradient(135deg, #1a2a1a 0%, #0f200f 60%, #0a1a0a 100%); }
    .card-bg-3 { background: linear-gradient(135deg, #2a1a0f 0%, #1a0f05 60%, #120900 100%); }
    .card-bg-4 { background: linear-gradient(135deg, #2a0f0f 0%, #1a0505 60%, #120000 100%); }
    .card-bg-all { background: linear-gradient(135deg, #0f3460 0%, #16213e 50%, #1a1a2e 100%); }

    .card-hero .card-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(20,20,20,0.95) 0%, rgba(20,20,20,0.3) 60%, transparent 100%);
    }

    .card-hero .card-content {
      position: relative;
      z-index: 2;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    .category-pill {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 100px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .pill-analysis { background: rgba(59,130,246,0.2);  color: #3b82f6; border: 1px solid rgba(59,130,246,0.35); }
    .pill-recap    { background: rgba(34,197,94,0.2);   color: #22c55e;  border: 1px solid rgba(34,197,94,0.35); }
    .pill-obituary { background: rgba(239,68,68,0.2);   color: #ef4444;  border: 1px solid rgba(239,68,68,0.35); }
    .pill-preview  { background: rgba(245,158,11,0.2);  color: #f59e0b;  border: 1px solid rgba(245,158,11,0.35); }

    .card-hero .card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      line-height: 1.2;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .card-hero .card-excerpt {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Secondary card (beside hero) */
    .card-secondary {
      position: relative;
      height: 420px;
      background: var(--surface);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .card-secondary .card-bg {
      position: absolute;
      inset: 0;
      transition: transform 0.4s ease;
    }
    .card-secondary:hover .card-bg { transform: scale(1.03); }
    .card-secondary .card-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(20,20,20,0.97) 0%, rgba(20,20,20,0.4) 60%, transparent 100%);
    }
    .card-secondary .card-content {
      position: relative;
      z-index: 2;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .card-secondary .card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      line-height: 1.25;
      color: #fff;
    }
    .card-secondary .card-excerpt {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Small grid */
    .small-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      margin-top: 2px;
    }

    .card-small {
      position: relative;
      height: 240px;
      background: var(--surface);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .card-small .card-bg {
      position: absolute;
      inset: 0;
      transition: transform 0.4s ease;
    }
    .card-small:hover .card-bg { transform: scale(1.04); }
    .card-small .card-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(20,20,20,0.97) 0%, rgba(20,20,20,0.1) 70%, transparent 100%);
    }
    .card-small .card-content {
      position: relative;
      z-index: 2;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .card-small .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      line-height: 1.35;
    }

    /* Transition for tab switch */
    .magazine-grid {
      opacity: 1;
      transition: opacity 0.2s;
    }
    .magazine-grid.fading { opacity: 0; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 0;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
    }

    /* Tablet */
    @media (max-width: 900px) {
      .feature-row { grid-template-columns: 1fr; }
      .card-hero, .card-secondary { height: 300px; }
      .card-secondary { height: 220px; }
      .small-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .annotation-badge { font-size: 9px; padding: 4px 8px; }
      .nav { padding: 0 16px; }
      .page-header { padding: 20px 16px 0; }
      .page-header h1 { font-size: 24px; }
      .tabs-bar { padding: 16px 16px 0; overflow-x: auto; }
      .tab-btn { font-size: 13px; padding: 8px 12px; white-space: nowrap; }
      .tab-btn:first-child { padding-left: 8px; }
      .magazine-outer { padding: 16px 16px 60px; }
      .small-grid { grid-template-columns: 1fr; }
      .card-hero .card-title { font-size: 22px; }
      .card-hero { height: 320px; }
      .card-secondary { height: 200px; }
    }
  </style>
</head>
<body>

<div class="annotation-badge">Option 15 — Category Tabs + Magazine Grid</div>

<nav class="nav">
  <a class="nav-logo" href="#">THE BRACKET LAB</a>
  <ul class="nav-links">
    <li><a href="#">Home</a></li>
    <li><a href="#">Brackets</a></li>
    <li><a href="#" class="active">Blog</a></li>
  </ul>
</nav>

<div class="page-header">
  <h1>The Lab Notes</h1>
  <p>Analysis · Recaps · Obituaries · 2026 Tournament</p>
</div>

<div class="tabs-bar">
  <button class="tab-btn active" data-filter="all">All</button>
  <button class="tab-btn" data-filter="recap">Recaps</button>
  <button class="tab-btn" data-filter="obituary">Obituaries</button>
  <button class="tab-btn" data-filter="analysis">Analysis</button>
  <button class="tab-btn" data-filter="preview">Previews</button>
</div>

<div class="magazine-outer">
  <div class="magazine-grid" id="grid"></div>
</div>

<script>
  const allPosts = [
    {
      id: 7,
      title: "Sweet 16 Preview: Which Models Still Have a Shot?",
      date: "Mar 26",
      category: "preview",
      excerpt: "Heading into the Sweet 16, two models are mathematically eliminated. Three are still alive. We break down every remaining path to victory and the upset scenarios that could scramble the leaderboard by Sunday.",
      bgClass: "card-bg-all",
    },
    {
      id: 8,
      title: "The Quant's Monte Carlo Meltdown",
      date: "Mar 24",
      category: "obituary",
      excerpt: "10,000 simulations ran. The Quant's champion survived 9,847 of them. Unfortunately, basketball is not a simulation. We autopsy the anomaly that ended The Quant's championship hopes.",
      bgClass: "card-bg-2",
    },
    {
      id: 5,
      title: "Eulogy for The Historian: Death by 12-Seed",
      date: "Mar 22",
      category: "obituary",
      excerpt: "The Historian's champion has fallen. A 12-seed did exactly what The Historian said couldn't happen — because it had never happened before. We gather to honor a model that trusted the past too much.",
      bgClass: "card-bg-3",
    },
    {
      id: 4,
      title: "Round of 64, Day 1: Chaos Reigns",
      date: "Mar 20",
      category: "recap",
      excerpt: "Twelve games. Four upsets. One model already looking shaky. Day 1 was bedlam. We tracked every pick in real time and watched the leaderboard flip four times before 9pm Eastern.",
      bgClass: "card-bg-4",
    },
    {
      id: 2,
      title: "The Scout's Film Room: Breaking Down the East Region",
      date: "Mar 16",
      category: "recap",
      excerpt: "The East is loaded with conflicting signals. The Scout ran 240 matchup analyses and came back with three teams it refuses to trust and two it likes far more than the committee did.",
      bgClass: "card-bg-1",
    },
    {
      id: 3,
      title: "Selection Sunday Reactions: Surprises and Snubs",
      date: "Mar 15",
      category: "analysis",
      excerpt: "The committee giveth and the committee taketh away. We ran all five models on the final bracket and tracked every seeding the models considered egregious.",
      bgClass: "card-bg-all",
    },
    {
      id: 6,
      title: "The Agent Goes Rogue: An Autonomous Bracket Experiment",
      date: "Mar 12",
      category: "analysis",
      excerpt: "We gave an autonomous AI agent one instruction: build me a bracket. No constraints. No guardrails. What happened next took 47 minutes and touched 12 different APIs.",
      bgClass: "card-bg-2",
    },
    {
      id: 1,
      title: "How We Built 5 AI Models to Destroy Your Bracket",
      date: "Mar 10",
      category: "analysis",
      excerpt: "Building five distinct AI systems to predict March Madness — a meditation on intelligence, bias, and randomness when the stakes are real.",
      bgClass: "card-bg-1",
    },
  ];

  const pillClass  = { analysis: 'pill-analysis', recap: 'pill-recap', obituary: 'pill-obituary', preview: 'pill-preview' };

  function renderGrid(filter) {
    const grid = document.getElementById('grid');
    const posts = filter === 'all' ? allPosts : allPosts.filter(p => p.category === filter);

    grid.classList.add('fading');

    setTimeout(() => {
      if (!posts.length) {
        grid.innerHTML = '<div class="empty-state">No posts in this category yet.</div>';
        grid.classList.remove('fading');
        return;
      }

      const [hero, secondary, ...rest] = posts;

      // Choose bg gradient per category for hero
      const heroBg = getGradientForCategory(filter || hero.category);
      const secBg  = secondary ? getGradientForCategory(secondary.category) : '';

      let html = `<div class="feature-row">`;

      // Hero
      html += `
        <a class="card-hero" href="#">
          <div class="card-bg" style="${heroBg}"></div>
          <div class="card-gradient"></div>
          <div class="card-content">
            <div class="card-meta">
              <span class="category-pill ${pillClass[hero.category]}">${hero.category}</span>
              <span class="card-date">${hero.date}</span>
            </div>
            <div class="card-title">${hero.title}</div>
            <div class="card-excerpt">${hero.excerpt}</div>
          </div>
        </a>
      `;

      // Secondary
      if (secondary) {
        html += `
          <a class="card-secondary" href="#">
            <div class="card-bg" style="${secBg}"></div>
            <div class="card-gradient"></div>
            <div class="card-content">
              <div class="card-meta">
                <span class="category-pill ${pillClass[secondary.category]}">${secondary.category}</span>
                <span class="card-date">${secondary.date}</span>
              </div>
              <div class="card-title">${secondary.title}</div>
              <div class="card-excerpt">${secondary.excerpt}</div>
            </div>
          </a>
        `;
      }

      html += `</div>`;

      // Small grid
      if (rest.length) {
        html += `<div class="small-grid">`;
        rest.forEach(post => {
          html += `
            <a class="card-small" href="#">
              <div class="card-bg" style="${getGradientForCategory(post.category)}"></div>
              <div class="card-gradient"></div>
              <div class="card-content">
                <div class="card-meta">
                  <span class="category-pill ${pillClass[post.category]}">${post.category}</span>
                  <span class="card-date">${post.date}</span>
                </div>
                <div class="card-title">${post.title}</div>
              </div>
            </a>
          `;
        });
        html += `</div>`;
      }

      grid.innerHTML = html;
      grid.classList.remove('fading');
    }, 150);
  }

  function getGradientForCategory(cat) {
    const maps = {
      analysis: 'background: linear-gradient(135deg, #0f3460 0%, #16213e 50%, #1a1a2e 100%)',
      recap:    'background: linear-gradient(135deg, #0a2010 0%, #0f2a15 50%, #101e10 100%)',
      obituary: 'background: linear-gradient(135deg, #280808 0%, #1a0404 50%, #120000 100%)',
      preview:  'background: linear-gradient(135deg, #1f1500 0%, #2a1d00 50%, #1a1200 100%)',
      all:      'background: linear-gradient(135deg, #0f3460 0%, #16213e 50%, #1a1a2e 100%)',
    };
    return maps[cat] || maps.all;
  }

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid(btn.dataset.filter);
    });
  });

  renderGrid('all');
</script>
</body>
</html>
