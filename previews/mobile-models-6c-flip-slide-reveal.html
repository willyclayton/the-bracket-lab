<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Option 6C: Slide-Reveal (No 3D)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #141414; color: #efefef; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 20px; max-width: 420px; margin: 0 auto; }
  h2 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; text-align: center; }
  .desc { text-align: center; color: #666; font-size: 12px; margin-bottom: 24px; }

  .cards { display: flex; flex-direction: column; gap: 10px; }

  .card {
    border: 1px solid #333; border-radius: 14px; background: #1e1e1e;
    overflow: hidden; cursor: pointer; transition: border-color 0.2s;
  }
  .card:hover, .card.open { border-color: var(--mc); }

  /* Always visible top section */
  .card-visible {
    display: flex; align-items: center; gap: 12px; padding: 14px 16px;
  }
  .color-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--mc); flex-shrink: 0; }
  .cv-icon { font-size: 22px; flex-shrink: 0; }
  .cv-info { flex: 1; }
  .cv-name { font-size: 14px; font-weight: 700; color: var(--mc); }
  .cv-tagline { font-size: 11px; color: #888; font-style: italic; font-family: Georgia, serif; }
  .cv-champ {
    font-family: monospace; font-size: 10px; color: #ccc; background: rgba(255,255,255,0.06);
    padding: 3px 8px; border-radius: 5px; flex-shrink: 0;
  }

  /* Hidden stats section — slides down */
  .card-stats {
    max-height: 0; overflow: hidden; transition: max-height 0.35s ease;
    border-top: 0px solid transparent;
  }
  .card.open .card-stats {
    max-height: 200px; border-top: 1px solid #2a2a2a;
  }

  .stats-inner { padding: 14px 16px; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
  .sg-label { font-family: monospace; font-size: 9px; text-transform: uppercase; color: #555; }
  .sg-value { font-family: monospace; font-size: 16px; font-weight: 600; }
  .sg-value.colored { color: var(--mc); }

  .progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .progress-bar { flex: 1; height: 4px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; background: var(--mc); }
  .progress-label { font-family: monospace; font-size: 9px; color: #555; flex-shrink: 0; }

  .stat-links { display: flex; gap: 16px; }
  .stat-links a { font-family: monospace; font-size: 11px; text-decoration: none; }
  .link-primary { color: var(--mc); }
  .link-secondary { color: #888; }
</style>
</head>
<body>
  <h2>Option 6C: Slide-Reveal</h2>
  <p class="desc">Full-width cards. Top shows name + tagline + champion. Tap to slide-reveal stats panel below. No 3D — simpler, works everywhere.</p>

  <div class="cards" id="cards"></div>

  <script>
    const models = [
      { icon: '\u{1F3AC}', name: 'The Scout', sub: 'LLM Matchup Analyst', tag: 'Film room intelligence at machine speed.', color: '#3b82f6', champ: 'Florida' },
      { icon: '\u{1F4CA}', name: 'The Quant', sub: 'Monte Carlo Simulation', tag: '10,000 simulations. Zero feelings.', color: '#22c55e', champ: 'Houston' },
      { icon: '\u{1F4DC}', name: 'The Historian', sub: 'Archetype Matching', tag: 'Every team has a twin. History already played this game.', color: '#f59e0b', champ: 'Duke' },
      { icon: '\u{1F525}', name: 'The Chaos Agent', sub: 'Upset Detector', tag: 'Your bracket is too safe. This one isn\'t.', color: '#ef4444', champ: 'UC San Diego' },
      { icon: '\u{1F3AF}', name: 'The Optimizer', sub: 'ESPN Points Maximizer', tag: 'Plays the scoring system, not the games.', color: '#06b6d4', champ: 'TBD' },
      { icon: '\u269B', name: 'Auto Researcher', sub: 'Strategy Optimizer', tag: '21 strategies. 14 years backtested.', color: '#f97316', champ: 'TBD' },
    ];

    const cardsEl = document.getElementById('cards');
    models.forEach((m, i) => {
      const card = document.createElement('div');
      card.className = `card${i === 0 ? ' open' : ''}`;
      card.style.setProperty('--mc', m.color);
      card.onclick = () => {
        document.querySelectorAll('.card').forEach(c => c !== card && c.classList.remove('open'));
        card.classList.toggle('open');
      };
      card.innerHTML = `
        <div class="card-visible">
          <span class="color-dot"></span>
          <span class="cv-icon">${m.icon}</span>
          <div class="cv-info">
            <div class="cv-name">${m.name}</div>
            <div class="cv-tagline">\u201C${m.tag}\u201D</div>
          </div>
          <span class="cv-champ">${m.champ}</span>
        </div>
        <div class="card-stats">
          <div class="stats-inner">
            <div class="stats-grid">
              <div><p class="sg-label">Score</p><p class="sg-value colored">\u2014</p></div>
              <div><p class="sg-label">Accuracy</p><p class="sg-value">\u2014</p></div>
              <div><p class="sg-label">Rank</p><p class="sg-value">\u2014</p></div>
            </div>
            <div class="progress-row">
              <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
              <span class="progress-label">0 / 1920</span>
            </div>
            <div class="stat-links">
              <a href="#" class="link-primary">View bracket \u2192</a>
              <a href="#" class="link-secondary">How it works \u2192</a>
            </div>
          </div>
        </div>`;
      cardsEl.appendChild(card);
    });
  </script>
</body>
</html>
